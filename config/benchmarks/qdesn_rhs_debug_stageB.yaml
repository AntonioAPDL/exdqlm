evaluation:
  experiment_name: qdesn_rhs_debug_stageB
  result_root: results/benchmarks/qdesn_synth
  datasets:
    - tourism_monthly
    - m4_monthly
  max_series_per_dataset: 1
  parallel:
    workers: 1
  debug_stages: [validation, test]
  series_overrides:
    selection:
      tourism_monthly: [T1]
      m4_monthly: [M23845]
    evaluation:
      tourism_monthly: [T1]
      m4_monthly: [M23845]
    audit:
      tourism_monthly: [T1]
      m4_monthly: [M23845]
  selection:
    enabled: false
    subset_size: 1
    min_train_points: 24
    quantile_guard:
      enabled: false
  routing:
    enabled: false
    fallback: dataset
  quantile_eval:
    enabled: true
    tail_threshold: 0.10
  m4_comparability:
    enabled: false
  baselines:
    models: []
    n_draws: 0
  audit:
    subset_size: 1
    save_draws: false

models:
  qdesn_synth:
    base:
      candidate_id: rhs_tau0_100_s2_1_initlogtau10_f50
      readout_approximation: laplace_delta
      p_vec: [0.05, 0.50, 0.95]
      fit:
        D: 1
        "n": [32]
        m: 12
        alpha: [0.20]
        rho: [0.90]
        act_f: tanh
        act_k: identity
        pi_w: [0.10]
        pi_in: [1.00]
        washout: 24
        add_bias: true
        standardize_inputs: true
        input_bound: tanh
        seed: 20260307
        seed_set:
          - [101]
      vb_args:
        max_iter: 1000
        min_iter_elbo: 15
        tol: 1.0e-4
        tol_par: 1.0e-4
        n_samp_xi: 80
        verbose: false
        readout_scale: true
        diagnostics:
          rhs_trace: true
          rhs_deep: false
          rhs_trace_thresholds: [1.0e3, 1.0e6, 1.0e9]
          rhs_trace_top_k: 20
          rhs_trace_eps: [1.0e-6, 1.0e-4, 1.0e-2]
        rhs:
          freeze_tau_iters: 50
          freeze_tau_warmup_iters: 50
          update_every: 1
          update_every_warmup: 1
          update_every_warmup_iters: 0
          beta_presteps: 1
          beta_presteps_iters: 0
          gradcheck: false
          gradcheck_iters: [1, 5]
          gradcheck_h: 1.0e-5
          tau_local_tol: 1.0e-3
          min_tau_updates: 1
          max_tau_updates: null
          force_tau_after_warmup: true
          recompute_elbo_after_tau_update: true
        beta_prior_type: rhs
        beta_rhs:
          tau0: 100.0
          nu: 4.0
          s2: 1.0
          shrink_intercept: false
          intercept_prec: 1.0e-16
          n_inner: 1
          eta_bounds:
            lambda: [-20, 20]
            tau: [-20, 20]
            c2: [-20, 20]
          h_curv: 1.0e-8
          var_floor: 1.0e-8
          verbose: false
          init_log_lambda: 0.0
          init_log_c2: 0.0
      sampling:
        nd_draws: 20
        chunk: 10
      synthesis:
        n_samp: 40
        grid_M: 101
        isotonic: true
        rearrange: true
        seed: 20260307
      preproc:
        scale_y: true
      calibration:
        mode: none
        tail_h: 0
        min_points: 0
      metrics:
        probs: [0.05, 0.50, 0.95]
