evaluation:
  # Full research protocol. This file uses explicit benchmark-side RHS
  # overrides for the current debug family and should not be read as the
  # repo-wide default model configuration.
  experiment_name: qdesn_synth_full
  result_root: results/benchmarks/qdesn_synth
  parallel:
    workers: 2
  selection:
    enabled: true
    subset_size: 8
    min_train_points: 24
    metric: crps_mean
    tie_breakers:
      - rhs_collapse_n
      - rhs_near_bound_n
      - shoulder_pinball_ratio
      - shoulder_qhat_ratio
      - tail_pinball_mean
      - quantile_abs_coverage_dev_mean
      - runtime_sec
      - candidate_id
    quantile_guard:
      enabled: true
      max_abs_coverage_dev: 0.35
      max_abs_tail_coverage_dev: 0.40
      max_abs_pit_dev_mean: 0.25
      max_shoulder_pinball_ratio: 100
      max_shoulder_qhat_ratio: 100
      forbid_rhs_collapse: true
      forbid_rhs_near_bound: true
      relax_if_no_eligible_candidates: false
  routing:
    enabled: true
    breaks: [96, 480]
    labels: [short, medium, long]
    fallback: dataset
  quantile_eval:
    enabled: true
    tail_threshold: 0.10
  m4_comparability:
    enabled: true
  baselines:
    models: [naive, seasonal_naive, naive2, drift, theta, ets, auto_arima]
    n_draws: 400
  audit:
    subset_size: 3
    save_draws: true

models:
  qdesn_synth:
    base:
      p_vec: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95]
      fit:
        D: 1
        "n": [128]
        m: 30
        alpha: [0.20]
        rho: [0.95]
        act_f: tanh
        act_k: identity
        pi_w: [0.10]
        pi_in: [1.00]
        washout: 60
        add_bias: true
        standardize_inputs: true
        input_bound: tanh
        seed: 20260306
        seed_set:
          - [101, 211, 307]
      vb_args:
        max_iter: 1000
        min_iter_elbo: 20
        tol: 1.0e-4
        tol_par: 1.0e-4
        n_samp_xi: 500
        verbose: false
        readout_scale: true
        diagnostics:
          rhs_trace: true
          rhs_deep: false
          rhs_trace_thresholds: [1.0e3, 1.0e6, 1.0e9]
          rhs_trace_top_k: 20
          rhs_trace_eps: [1.0e-6, 1.0e-4, 1.0e-2]
        rhs:
          freeze_tau_iters: 50
          freeze_tau_warmup_iters: 50
          update_every: 1
          update_every_warmup: 1
          update_every_warmup_iters: 0
          beta_presteps: 1
          beta_presteps_iters: 0
          gradcheck: false
          gradcheck_iters: [1, 5]
          gradcheck_h: 1.0e-5
          tau_local_tol: 1.0e-3
          min_tau_updates: 1
          max_tau_updates: null
          force_tau_after_warmup: true
          recompute_elbo_after_tau_update: true
        beta_prior_type: rhs
        beta_rhs:
          # Benchmark profile override: pinned research/debug RHS setting.
          # Repo-wide defaults remain in config/defaults.yaml.
          tau0: 100.0
          nu: 4.0
          s2: 1.0
          shrink_intercept: false
          intercept_prec: 1.0e-16
          n_inner: 1
          eta_bounds:
            lambda: [-20, 20]
            tau: [-20, 20]
            c2: [-20, 20]
          h_curv: 1.0e-8
          var_floor: 1.0e-8
          verbose: false
          init_log_lambda: 0.0
          init_log_c2: 0.0
      sampling:
        nd_draws: 240
        chunk: 96
      synthesis:
        n_samp: 600
        grid_M: 401
        isotonic: true
        rearrange: true
        seed: 20260306
      preproc:
        scale_y: true
      calibration:
        mode: affine
        tail_h: 12
        min_points: 6
      metrics:
        probs: [0.025, 0.05, 0.10, 0.50, 0.90, 0.95, 0.975]
    grid:
      blocks:
        - prefix: short_d1_broad
          values:
            fit:
              D: [1]
              "n":
                - [32]
                - [64]
                - [128]
              m: [12, 24, 36]
              alpha:
                - [0.05]
                - [0.10]
                - [0.20]
                - [0.30]
                - [0.50]
              rho:
                - [0.90]
                - [0.95]
                - [0.98]
              pi_w:
                - [0.05]
                - [0.10]
              pi_in:
                - [0.50]
                - [1.00]
              washout: [24, 48, 72]
            applicability:
              route_keys: [short]
            calibration:
              mode: [bias]
              tail_h: [8]
          budget:
            max_candidates: 8
