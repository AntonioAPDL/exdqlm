evaluation:
  experiment_name: qdesn_synth_pilot
  result_root: results/benchmarks/qdesn_synth
  datasets:
    - tourism_monthly
    - m4_monthly
  max_series_per_dataset: 1
  parallel:
    workers: 1
  selection:
    enabled: true
    subset_size: 1
    min_train_points: 24
    metric: crps_mean
    tie_breakers:
      - rhs_collapse_n
      - rhs_near_bound_n
      - shoulder_pinball_ratio
      - shoulder_qhat_ratio
      - tail_pinball_mean
      - quantile_abs_coverage_dev_mean
      - runtime_sec
      - candidate_id
    quantile_guard:
      enabled: true
      max_abs_coverage_dev: 0.35
      max_abs_tail_coverage_dev: 0.40
      max_abs_pit_dev_mean: 0.25
      max_shoulder_pinball_ratio: 100
      max_shoulder_qhat_ratio: 100
      forbid_rhs_collapse: true
      forbid_rhs_near_bound: true
      relax_if_no_eligible_candidates: false
  routing:
    enabled: true
    breaks: [96, 480]
    labels: [short, medium, long]
    fallback: dataset
  quantile_eval:
    enabled: true
    tail_threshold: 0.10
  m4_comparability:
    enabled: true
  baselines:
    models: [naive, seasonal_naive, naive2, drift, theta, ets, auto_arima]
    n_draws: 120
  audit:
    subset_size: 1
    save_draws: true

models:
  qdesn_synth:
    base:
      p_vec: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90, 0.95]
      fit:
        D: 1
        "n": [128]
        m: 30
        alpha: [0.20]
        rho: [0.95]
        act_f: tanh
        act_k: identity
        pi_w: [0.10]
        pi_in: [1.00]
        washout: 60
        add_bias: true
        standardize_inputs: true
        input_bound: tanh
        seed: 20260306
        seed_set:
          - [101, 211]
      vb_args:
        max_iter: 1000
        min_iter_elbo: 20
        tol: 1.0e-4
        tol_par: 1.0e-4
        n_samp_xi: 500
        verbose: false
        readout_scale: true
        diagnostics:
          rhs_trace: true
          rhs_deep: false
          rhs_trace_thresholds: [1.0e3, 1.0e6, 1.0e9]
          rhs_trace_top_k: 20
          rhs_trace_eps: [1.0e-6, 1.0e-4, 1.0e-2]
        rhs:
          freeze_tau_iters: 50
          freeze_tau_warmup_iters: 50
          update_every: 1
          update_every_warmup: 1
          update_every_warmup_iters: 0
          beta_presteps: 1
          beta_presteps_iters: 0
          gradcheck: false
          gradcheck_iters: [1, 5]
          gradcheck_h: 1.0e-5
          tau_local_tol: 1.0e-3
          min_tau_updates: 1
          max_tau_updates: null
          force_tau_after_warmup: true
          recompute_elbo_after_tau_update: true
        beta_prior_type: rhs
        beta_rhs:
          tau0: 100.0
          nu: 4.0
          s2: 1.0
          shrink_intercept: false
          intercept_prec: 1.0e-16
          n_inner: 1
          eta_bounds:
            lambda: [-20, 20]
            tau: [-20, 20]
            c2: [-20, 20]
          h_curv: 1.0e-8
          var_floor: 1.0e-8
          verbose: false
          init_log_lambda: 0.0
          init_log_c2: 0.0
      sampling:
        nd_draws: 80
        chunk: 64
      synthesis:
        n_samp: 200
        grid_M: 201
        isotonic: true
        rearrange: true
        seed: 20260306
      preproc:
        scale_y: true
      calibration:
        mode: affine
        tail_h: 12
        min_points: 6
      metrics:
        probs: [0.05, 0.10, 0.50, 0.90, 0.95]
    grid:
      blocks:
        - prefix: pilot_short_d1_broad
          values:
            fit:
              D: [1]
              "n":
                - [32]
                - [64]
                - [128]
              m: [12, 24, 36]
              alpha:
                - [0.05]
                - [0.20]
                - [0.50]
              rho:
                - [0.90]
                - [0.95]
              washout: [24, 48, 72]
            applicability:
              route_keys: [short]
            calibration:
              mode: [bias]
          budget:
            max_candidates: 1
            seed: 20260306
        - prefix: pilot_medium_d1_broad
          values:
            fit:
              D: [1]
              "n":
                - [32]
                - [64]
                - [128]
                - [256]
              m: [12, 24, 36, 48, 72]
              alpha:
                - [0.05]
                - [0.10]
                - [0.20]
                - [0.30]
                - [0.50]
              rho:
                - [0.90]
                - [0.95]
                - [0.98]
              pi_w:
                - [0.05]
                - [0.10]
              pi_in:
                - [0.50]
                - [1.00]
              washout: [24, 48, 72, 96]
            applicability:
              route_keys: [medium]
            calibration:
              mode: [affine]
          budget:
            max_candidates: 2
            seed: 20260307
        - prefix: pilot_medium_d2_broad
          values:
            fit:
              D: [2]
              "n":
                - [64, 64]
                - [128, 64]
                - [128, 128]
              n_tilde:
                - [32]
                - [64]
              m: [24, 36, 48]
              alpha:
                - [0.05, 0.05]
                - [0.10, 0.10]
                - [0.20, 0.20]
              rho:
                - [0.95, 0.95]
                - [0.98, 0.95]
              pi_w:
                - [0.05, 0.05]
                - [0.10, 0.10]
              pi_in:
                - [0.50, 0.50]
                - [1.00, 1.00]
              washout: [48, 72, 96]
            applicability:
              route_keys: [medium]
            calibration:
              mode: [affine]
          budget:
            max_candidates: 1
            seed: 20260308
        - prefix: pilot_long_d1_broad
          values:
            fit:
              D: [1]
              "n":
                - [128]
                - [256]
              m: [24, 36, 48, 72]
              alpha:
                - [0.05]
                - [0.10]
                - [0.20]
              rho:
                - [0.95]
                - [0.98]
              pi_w:
                - [0.02]
                - [0.05]
              pi_in:
                - [0.25]
                - [0.50]
              washout: [72, 120]
            applicability:
              route_keys: [long]
            calibration:
              mode: [affine]
          budget:
            max_candidates: 1
            seed: 20260309
