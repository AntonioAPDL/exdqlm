datasets:
  - slug: san_lorenzo_daily
    mode: real
    input_path: /data/muscat_data/jaguir26/data/data_USGS_ppt_soil.csv
    overrides:
      pipeline:
        mode: real
      columns:
        y: USGS
        x: [ppt, soil]
      preproc:
        scale_y: true
        scale_x: true
      lags:
        m_y: 90
        m_x: 90
      split:
        T_use: 10000
        train_prop: 0.95
        use_last: true
      forecast:
        mode: mixture
        horizon: 1
