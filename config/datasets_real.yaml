datasets:
  - slug: san_lorenzo_daily
    mode: real
    input_path: /data/muscat_data/jaguir26/data/data_USGS_ppt_soil.csv
    overrides:
      pipeline:
        mode: real
      columns:
        y: USGS
        x: [ppt, soil]
      preproc:
        scale_y: true
        scale_x: true
      lags:
        m_y: 60
        m_x: 60
      split:
        T_use: 10000
        train_prop: 0.95
        use_last: true
      forecast:
        mode: recursive-stochastic   # (will log a warning; pipeline still runs TF)
        H_step: 1
        tf_first_k: 0
        paths: 500
