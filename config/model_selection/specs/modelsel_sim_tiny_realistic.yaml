base_cfg_overrides:
  pipeline:
    mode: sim
  forecast:
    horizon: 20
  sampling:
    nd_draws: 100
  synthesis:
    n_samp: 100

model_selection:
  calcrps:
    enabled: false
  stages:
    - name: tiny_realistic
      seeds: [1]
      p_vec: [0.05, 0.50, 0.95]
      nd_draws: 100
      synth_n_samp: 100
      origins:
        policy: subsample
        frac: 0.1
        seed: 123
      horizon: 20
      candidate_grid:
        D: [1]
        n1: [300, 500]
        m: [30]
        alpha: [0.1]
        rho: [0.90]
      budget:
        max_candidates: 2
        strategy: random_subset
