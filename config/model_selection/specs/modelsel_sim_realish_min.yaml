base_cfg_overrides:
  pipeline:
    mode: sim
  forecast:
    horizon: 30
  sampling:
    nd_draws: 50
  synthesis:
    n_samp: 50

model_selection:
  calcrps:
    enabled: false
  stages:
    - name: realish_min
      seeds: [1]
      p_vec: [0.05, 0.50, 0.95]
      nd_draws: 50
      synth_n_samp: 50
      origins:
        policy: subsample
        frac: 0.1
        seed: 123
      horizon: 30
      candidate_grid:
        D: [1]
        n1: [500]
        m: [30]
        alpha: [0.2]
        rho: [0.95]
      budget:
        max_candidates: 1
        strategy: full_grid
