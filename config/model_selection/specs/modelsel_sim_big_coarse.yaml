# Big model-selection run (SIM) — Coarse stage
# Matches v2 doc + repo truth: origin-mode (lead-1) scoring, uniform mean over targets.

base_cfg_overrides:
  pipeline:
    mode: sim

model_selection:
  calcrps:
    enabled: true
  stages:
    - name: coarse
      seeds: [1, 2]
      p_vec: [0.05, 0.50, 0.95]
      nd_draws: 1500
      synth_n_samp: 800
      origins:
        policy: subsample
        frac: 0.30
        seed: 123
      horizon: 60
      candidate_grid:
        D: [1, 2, 3]
        n1: [500, 800, 1200, 1500]
        r2: [0.5, 0.8, 1.0]
        r3: [0.5, 0.8, 1.0]
        m: [30, 60, 90, 120]
        alpha: [0.1, 0.2, 0.3]
        rho: [0.90, 0.95, 0.98]
      budget:
        max_candidates: 100
        strategy: random_subset
