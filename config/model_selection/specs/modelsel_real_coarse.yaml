base_cfg_overrides:
  pipeline:
    mode: real

model_selection:
  stages:
    - name: coarse
      seeds: [1]
      p_vec: [0.05, 0.50, 0.95]
      nd_draws: 1000
      synth_n_samp: 500
      origins:
        policy: subsample
        frac: 0.25
        seed: 123
      horizon: 30
      candidate_grid:
        D: [1, 2, 3]
        n1: [300, 500, 800, 1000, 1500]
        r2: [0.5, 0.8, 1.0]
        r3: [0.5, 0.8, 1.0]
        m: [30, 60, 90, 120, 180]
        alpha: [0.05, 0.1, 0.2, 0.3]
        rho: [0.90, 0.95, 0.98]
      budget:
        max_candidates: 100
        strategy: random_subset
