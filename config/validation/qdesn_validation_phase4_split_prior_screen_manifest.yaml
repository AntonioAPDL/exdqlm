stages:
  - id: S1_severe_quartet_broad
    description: Broad split-prior screen on the four severe all-four roots.
    profile_source: all_candidates
    selector:
      mode: failure_cluster
      failure_clusters: [all_four]
    advance:
      type: rank_filter_top_n
      top_n: 4
      max_severe_fail_n: 2
      max_total_fail_n: 2
      max_runtime_inflation: 0.90
      min_fail_reduction: 0.10
      min_severe_improved_n: 1

  - id: S2_full_six_zero_fail
    description: Full fixed 6-root zero-FAIL screen for the quartet survivors.
    profile_source: selected_from_previous
    selector:
      mode: all
    advance:
      type: rank_filter_top_n
      top_n: 2
      max_total_fail_n: 4
      max_sentinel_fail_n: 1
      max_runtime_inflation: 0.90
      min_fail_reduction: 0.20
      min_severe_improved_n: 1
