meta:
  name: qdesn_validation_phase4_split_prior_screen_20260331
  display_name: QDESN Phase 4 Split-Prior Zero-FAIL Screen
  purpose: >
    Broad, stage-gated split-prior repair screen built on the strongest transformed-sigma signal from
    Family-B. Targets FAIL -> WARN improvement, not universal PASS, and separates ridge versus rhs_ns
    repair levers to avoid repeating exhausted global families.
  branch: feature/qdesn-mcmc-alternative
  safe_default: prepare_only

inputs:
  phase01_manifest: reports/qdesn_mcmc_validation/finalization_closeout-rhsfixrelaunch-20260329b__git-6ac4727/summary/phase01_manifest.json
  base_defaults: config/validation/qdesn_dynamic_family_prior_repair_defaults.yaml

outputs:
  report_root: reports/qdesn_mcmc_validation/qdesn_validation_phase4_split_prior_screen
  results_root: results/qdesn_mcmc_validation/qdesn_validation_phase4_split_prior_screen

controls:
  anchor_profile_id: R0_current_best_anchor
  resume_completed_stages: true
  create_plots: false
  profile_verbose: true
  campaign_workers: 4
  threads_per_worker: 1
  profile_timeout_minutes: 90
  timeout_kill_after_seconds: 30
  continue_on_profile_error: true
  max_timeout_profiles: 3
  max_error_profiles: 4
  stop_on_anchor_operational_failure: true

batches:
  - id: B0_current_best
    description: Current-best transformed-sigma baseline anchor.
  - id: B1_split_prior_core
    description: Split-prior hybrids that separate ridge and rhs_ns tuning without aggressive rhs overlays.
  - id: B2_split_prior_rhsns_overlay
    description: Split-prior hybrids that add stronger rhs_ns-specific warmup and global-local stabilization.

profiles:
  - id: R0_current_best_anchor
    batch: B0_current_best
    family: current_best_anchor
    description: >
      Exact current-best transformed-sigma gamma-focus baseline from the completed Family-B screen.
      This is the live comparison anchor for the zero-FAIL wave.
    patch:
      pipeline:
        inference:
          mcmc:
            transforms:
              use_log_sigma: true
              sigma_eta_bounds: [-10, 10]
            slice:
              core_update_mode: sigma_then_gamma
              width_gamma: 0.45
              width_sigma: 0.30
              core_extra_passes: 1
              max_steps_out: 55
              max_shrink: 220
              max_steps_out_sigma: 90
              max_shrink_sigma: 300
            prior_overrides:
              ridge:
                n_burn: 300
                n_mcmc: 600
                progress_every: 50
                slice:
                  width_gamma: 0.45
                  width_sigma: 0.30
                  core_extra_passes: 1
                  max_steps_out: 55
                  max_shrink: 220
                  max_steps_out_sigma: 90
                  max_shrink_sigma: 300
              rhs_ns:
                n_burn: 500
                n_mcmc: 1000
                progress_every: 100
                rhs:
                  freeze_tau_burnin_iters: 40
                  freeze_tau_only_during_burn: true
                  width_adapt:
                    enabled: true
                    warmup_iters: 250
                    only_during_burn: true
                    target_score_low: -1.0
                    target_score_high: 1.0
                    step_size: 0.02
                    width_min: 0.02
                    width_max: 2.0
                slice:
                  width_gamma: 0.45
                  width_sigma: 0.35
                  width_rhs_lambda: 0.20
                  width_rhs_tau: 0.14
                  width_rhs_c2: 0.09
                  width_rhs_tau_c2_block: 0.30
                  rhs_global_block_update: transformed_tau_c2_block
                  rhs_transformed_block_passes: 3
                  width_rhs_tau_c2_transformed_z1: 0.26
                  width_rhs_tau_c2_transformed_z2: 0.20
                  core_extra_passes: 1
                  max_steps_out: 65
                  max_shrink: 240
                  max_steps_out_sigma: 110
                  max_shrink_sigma: 320

  - id: R15_split_prior_hybrid
