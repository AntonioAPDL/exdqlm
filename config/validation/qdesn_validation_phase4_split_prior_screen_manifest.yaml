                n_mcmc: 600
                progress_every: 50
                slice:
                  core_update_mode: sigma_then_gamma
                  width_gamma: 0.55
                  width_sigma: 0.22
                  core_extra_passes: 0
                  max_steps_out: 50
                  max_shrink: 210
                  max_steps_out_sigma: 110
                  max_shrink_sigma: 340
              rhs_ns:
                n_burn: 500
                n_mcmc: 1000
                progress_every: 100
                rhs:
