stages:
  - id: F1_rhs_long_normal_tail_final
    label: Final RHS Long-Horizon Normal Lower-Tail Closure
    rationale: >
      Exact target is the remaining normal tau=0.05 lastTT5000 rhs_ns mcmc_exal fail row under the
      promoted L760 local baseline. Nearby long-horizon rhs roots are rerun as guard rails.
    profile_ids:
      [
        M810_rhs_long_freeze120_chain1400,
        M820_rhs_long_freeze125_chain1500,
        M830_rhs_long_narrow1400,
        M840_rhs_long_narrow1500_diag5,
        M850_rhs_long_burnheavy1300
      ]
    selection_metric: target_fit_fail_n
    target_selector:
      family: [normal]
      tau: [0.05]
      fit_size: [5000]
      prior: [rhs_ns]
      inference: [mcmc]
      model: [exal]
      signoff_grade: [FAIL]
    include_root_ids:
      [
        root__dynamic__dlm_constV_smallW__laplace__tau_0p25__lasttt_5000__qdesn_rhs_ns,
        root__dynamic__dlm_constV_smallW__normal__tau_0p25__lasttt_5000__qdesn_rhs_ns,
        root__dynamic__dlm_constV_smallW__normal__tau_0p95__lasttt_5000__qdesn_rhs_ns
      ]

  - id: F2_rhs_short_normal_tail_final
    label: Final RHS Short-Horizon Normal Upper-Tail Closure
    rationale: >
      Exact target is the remaining normal tau=0.95 lastTT500 rhs_ns mcmc_exal fail row under the
      promoted L770 local baseline. Nearby short-horizon mixed-pocket roots are rerun as guard
      rails so the final fix does not regress the surrounding pocket.
    profile_ids:
      [
        M910_short_rhs_freeze100_chain1100,
        M920_short_rhs_freeze105_chain1200,
        M930_short_rhs_narrow1100,
        M940_short_rhs_narrow1200_diag5,
        M950_short_rhs_freeze110_chain1000
      ]
    selection_metric: target_fit_fail_n
    target_selector:
      family: [normal]
      tau: [0.95]
      fit_size: [500]
      prior: [rhs_ns]
      inference: [mcmc]
      model: [exal]
      signoff_grade: [FAIL]
    include_root_ids:
      [
        root__dynamic__dlm_constV_smallW__laplace__tau_0p95__lasttt_500__qdesn_rhs_ns,
        root__dynamic__dlm_constV_smallW__normal__tau_0p05__lasttt_500__qdesn_rhs_ns,
        root__dynamic__dlm_constV_smallW__normal__tau_0p05__lasttt_500__qdesn_ridge
      ]
