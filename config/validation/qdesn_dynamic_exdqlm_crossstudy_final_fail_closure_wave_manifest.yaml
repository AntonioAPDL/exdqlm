  - profile_id: M940_short_rhs_narrow1200_diag5
    label: Short RHS Narrow1200 Diag5
    rationale: >
      Strongest short-horizon rhs hedge: deeper chain, narrower rhs block widths, and one extra
      transformed pass.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_strong
