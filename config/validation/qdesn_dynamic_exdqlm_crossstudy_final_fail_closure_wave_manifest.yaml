profiles:
  - profile_id: M810_rhs_long_freeze120_chain1400
    label: RHS Long Freeze120 Chain1400
    rationale: >
      First pure rhs-only escalation from L760: add keep draws and a slightly longer tau freeze
      without changing the successful VB-side guard structure.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              rhs_ns: *rhs_vb_guard_plus
          mcmc:
            prior_overrides:
              rhs_ns: *rhs_long_freeze120_chain1400

  - profile_id: M820_rhs_long_freeze125_chain1500
    label: RHS Long Freeze125 Chain1500
    rationale: >
      Deepest simple chain-length follow-up retained because the surviving long-horizon miss still
      shows both Geweke and half-chain drift.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              rhs_ns: *rhs_vb_guard_plus
          mcmc:
            prior_overrides:
              rhs_ns: *rhs_long_freeze125_chain1500

  - profile_id: M830_rhs_long_narrow1400
    label: RHS Long Narrow1400
    rationale: >
      Same general depth as M810, but with narrower rhs transformed-block widths to test whether
      the final miss is now mostly a mixing-geometry problem.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              rhs_ns: *rhs_vb_guard_plus
          mcmc:
            prior_overrides:
              rhs_ns: *rhs_long_narrow1400

  - profile_id: M840_rhs_long_narrow1500_diag5
    label: RHS Long Narrow1500 Diag5
    rationale: >
      Strongest rhs-only final hedge: deeper chain plus narrower transformed blocks and an extra
      transformed pass for the last long-horizon normal lower-tail miss.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              rhs_ns: *rhs_vb_guard_plus
          mcmc:
            prior_overrides:
              rhs_ns: *rhs_long_narrow1500_diag5

  - profile_id: M850_rhs_long_burnheavy1300
    label: RHS Long Burnheavy1300
    rationale: >
      Burn-focused variant retained to separate warmup stabilization effects from pure keep-draw
      depth in the long-horizon rhs pocket.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              rhs_ns: *rhs_vb_guard_plus
          mcmc:
            prior_overrides:
              rhs_ns: *rhs_long_burnheavy1300

  - profile_id: M910_short_rhs_freeze100_chain1100
    label: Short RHS Freeze100 Chain1100
    rationale: >
      Smallest rhs-only escalation from L770 for the remaining short-horizon normal upper-tail
      Geweke miss.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_strong
              rhs_ns: *rhs_vb_guard_strong
          mcmc:
            prior_overrides:
              ridge: *ridge_softgamma_chain1400
              rhs_ns: *rhs_short_freeze100_chain1100

  - profile_id: M920_short_rhs_freeze105_chain1200
    label: Short RHS Freeze105 Chain1200
    rationale: >
      Deeper short-horizon rhs-only follow-up kept because the target row is now a single MCMC
      drift failure and the stage is cheap.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_strong
              rhs_ns: *rhs_vb_guard_strong
          mcmc:
            prior_overrides:
              ridge: *ridge_softgamma_chain1400
              rhs_ns: *rhs_short_freeze105_chain1200

  - profile_id: M930_short_rhs_narrow1100
    label: Short RHS Narrow1100
    rationale: >
      Moderate chain increase plus narrower rhs widths, aimed at improving short-horizon mixing
      without overextending runtime.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_strong
              rhs_ns: *rhs_vb_guard_strong
          mcmc:
            prior_overrides:
              ridge: *ridge_softgamma_chain1400
