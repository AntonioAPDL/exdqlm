profiles:
  - profile_id: D110_ridge_lower_vb320
    label: Ridge Lower VB320
    rationale: >
      Cheapest deep-DESN ridge lower-tail rescue. Increase the ridge VB Monte Carlo budget and ELBO
      horizon only, without touching healthy ridge MCMC rows.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_320

  - profile_id: D120_ridge_lower_vb384
    label: Ridge Lower VB384
    rationale: >
      Mid-intensity deep-DESN ridge lower-tail guard retained because the current fail band is
      dominated by ridge VB core-tail instability rather than likelihood-specific behavior.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_384

  - profile_id: D130_ridge_lower_vb448
    label: Ridge Lower VB448
    rationale: >
      Stronger ridge lower-tail hedge for the long-horizon rows that remain unstable under the
      default deep-DESN budget.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_448

  - profile_id: D140_ridge_lower_vb512
    label: Ridge Lower VB512
    rationale: >
      Highest-value ridge lower-tail stress test in this neighborhood. Included once to learn
      whether the deep-DESN lower-tail ridge failures are still primarily under-iterated.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_512

  - profile_id: D210_ridge_upper_combo320_soft3000
    label: Ridge Upper Combo320 Soft3000
    rationale: >
      Smallest mixed ridge upper-tail candidate: strengthen ridge VB and modestly deepen the ridge
      MCMC chain to address the coupled upper-tail `vb` plus `mcmc_exal` fail surface.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_320
          mcmc:
            prior_overrides:
              ridge: *ridge_softgamma_3000

  - profile_id: D220_ridge_upper_combo384_soft3200
    label: Ridge Upper Combo384 Soft3200
    rationale: >
      Balanced ridge upper-tail candidate kept because the deep-DESN upper-tail rows show both VB
      tail instability and MCMC diagnostic softness.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_384
          mcmc:
            prior_overrides:
              ridge: *ridge_softgamma_3200

  - profile_id: D230_ridge_upper_combo384_diag3200
    label: Ridge Upper Combo384 Diag3200
    rationale: >
      Diagnostic ridge upper-tail candidate with narrower gamma/sigma geometry, aimed directly at
      the surviving upper-tail MCMC diagnostic failures without abandoning the stronger VB guard.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_384
          mcmc:
            prior_overrides:
              ridge: *ridge_diag_3200

  - profile_id: D240_ridge_upper_combo448_diag3400
    label: Ridge Upper Combo448 Diag3400
    rationale: >
      Deeper ridge upper-tail hedge for the long-horizon rows in case the deep-DESN upper-tail
      instability is still partly burn-limited under the softer profiles.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_448
          mcmc:
            prior_overrides:
              ridge: *ridge_diag_3400

  - profile_id: D250_ridge_upper_combo512_diag3400
    label: Ridge Upper Combo512 Diag3400
    rationale: >
      Strongest retained ridge upper-tail profile. Included once to test whether the worst
      deep-DESN upper-tail ridge rows require both the heaviest VB guard and the deepest diagnostic
      chain.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_512
          mcmc:
            prior_overrides:
              ridge: *ridge_diag_3400

  - profile_id: D310_rhs_short_drift2600
    label: RHS Short Drift2600
    rationale: >
      Cheapest short-horizon rhs_ns MCMC rescue. Lengthen burn and draws while keeping the
      transformed-block geometry close to the current deep-DESN source.
    overrides:
      pipeline:
        inference:
          mcmc:
            prior_overrides:
              rhs_ns: *rhs_short_drift_2600

  - profile_id: D320_rhs_short_narrow2800
    label: RHS Short Narrow2800
    rationale: >
      Narrower short-horizon rhs_ns candidate aimed at the pervasive high-autocorrelation and drift
