meta:
  name: qdesn_dynamic_exdqlm_crossstudy_effective_w300_postdraw_deepdesn_fail_closure_wave_20260409
  display_name: QDESN Dynamic Effective-W300 Deep-DESN Scientific Fail Closure Wave
  purpose: >
    Continue from the completed deep-DESN full rerun and spend overnight compute only on the
    remaining scientific FAIL surface. Keep the completed deep-DESN rerun as the default source,
    do not search for a single generic rescue, and retune only inside the localized ridge-VB and
    rhs_ns-MCMC neighborhoods that dominate the fail inventory.
  branch: feature/qdesn-mcmc-alternative-0p4p0-integration
  safe_default: prepare_only
  run_tag_prefix: qdesn-dynamic-exdqlm-crossstudy-deepdesn-fitfail

