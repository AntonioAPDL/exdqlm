stages:
  - id: D1_ridge_lower_tail_vb
    label: Ridge Lower-Tail VB Stabilization
    rationale: >
      The deep-DESN lower-tail ridge debt is entirely a VB problem and appears in both short and
      long horizons. Keep the guard set broad across families, but retune only the ridge VB budget.
    profile_ids:
      - D110_ridge_lower_vb320
      - D120_ridge_lower_vb384
      - D130_ridge_lower_vb448
      - D140_ridge_lower_vb512
    selection_metric: target_fit_fail_n
    include_root_ids:
      - root__dynamic__dlm_constV_smallW__gausmix__tau_0p05__lasttt_500__qdesn_ridge
      - root__dynamic__dlm_constV_smallW__gausmix__tau_0p05__lasttt_5000__qdesn_ridge
      - root__dynamic__dlm_constV_smallW__laplace__tau_0p05__lasttt_500__qdesn_ridge
      - root__dynamic__dlm_constV_smallW__laplace__tau_0p05__lasttt_5000__qdesn_ridge
      - root__dynamic__dlm_constV_smallW__normal__tau_0p05__lasttt_500__qdesn_ridge
      - root__dynamic__dlm_constV_smallW__normal__tau_0p05__lasttt_5000__qdesn_ridge
    target_selector:
      prior: [ridge]
      inference: [vb]
      tau: [0.05]
      fit_size: [500, 5000]
      signoff_grade: [FAIL]

  - id: D2_ridge_upper_tail_mixed
    label: Ridge Upper-Tail Mixed Stabilization
    rationale: >
      The deep-DESN upper-tail ridge debt is mixed: ridge VB fails broadly and ridge MCMC still
      carries a small exAL/AL diagnostic pocket. Reuse the same upper-tail guard set and search
      only inside a coupled ridge VB plus ridge MCMC neighborhood.
    profile_ids:
      - D210_ridge_upper_combo320_soft3000
      - D220_ridge_upper_combo384_soft3200
      - D230_ridge_upper_combo384_diag3200
      - D240_ridge_upper_combo448_diag3400
      - D250_ridge_upper_combo512_diag3400
    selection_metric: target_fit_fail_n
    include_root_ids:
      - root__dynamic__dlm_constV_smallW__gausmix__tau_0p95__lasttt_500__qdesn_ridge
      - root__dynamic__dlm_constV_smallW__gausmix__tau_0p95__lasttt_5000__qdesn_ridge
