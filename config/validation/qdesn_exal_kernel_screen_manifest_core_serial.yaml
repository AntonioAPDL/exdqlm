meta:
  name: qdesn_exal_kernel_screen_core_serial_20260330
  purpose: Fallback serial core-only relaunch for the highest-value shared exAL controls.
  branch: feature/qdesn-mcmc-alternative
  safe_default: prepare_only

inputs:
  phase01_manifest: reports/qdesn_mcmc_validation/finalization_closeout-rhsfixrelaunch-20260329b__git-6ac4727/summary/phase01_manifest.json
  base_defaults: config/validation/qdesn_dynamic_family_prior_defaults.yaml

outputs:
  report_root: reports/qdesn_mcmc_validation/exal_kernel_screen
  results_root: results/qdesn_mcmc_validation/exal_kernel_screen

controls:
  resume_completed_profiles: true
  campaign_workers: 1
  threads_per_worker: 1
  create_plots: false
  profile_verbose: true
  profile_timeout_minutes: 45
  timeout_kill_after_seconds: 30
  continue_on_profile_error: true
  max_timeout_profiles: 2
  max_error_profiles: 3
  stop_on_anchor_operational_failure: true

batches:
  - id: B0_anchor_core
    description: Anchor plus shared exAL core stabilization screen.

profiles:
  - id: X0_anchor_baseline
    batch: B0_anchor_core
    family: anchor
    description: Fresh anchor on the 6-root harness to confirm the runner and benchmark reproducibility.
    patch: {}

  - id: X1_core_pass1_soft
    batch: B0_anchor_core
    family: core_screen
    description: One extra exAL core pass with moderately tighter gamma and sigma widths.
    patch:
      pipeline:
        inference:
          mcmc:
            slice:
              core_extra_passes: 1
            prior_overrides:
              ridge:
                slice:
                  width_gamma: 0.50
                  width_sigma: 0.30
                  max_steps_out: 50
                  max_shrink: 200
              rhs_ns:
                slice:
                  width_gamma: 0.50
                  width_sigma: 0.30
                  max_steps_out: 60
                  max_shrink: 220

  - id: X10_core_gamma_focus_pass1
    batch: B0_anchor_core
    family: core_screen
    description: Gamma-focused sharpening to target the shared exAL low-ESS and high-ACF gamma failures.
    patch:
      pipeline:
        inference:
          mcmc:
            slice:
              core_extra_passes: 1
            prior_overrides:
              ridge:
                slice:
                  width_gamma: 0.45
                  width_sigma: 0.35
