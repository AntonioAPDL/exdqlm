campaign:
  name: qdesn_dynamic_exdqlm_crossstudy_validation
  results_root: results/qdesn_mcmc_validation/dynamic_exdqlm_crossstudy_validation
  reports_root: reports/qdesn_mcmc_validation/dynamic_exdqlm_crossstudy_validation

pilot:
  source_root_kind: dynamic
  source_scenario: dlm_constV_smallW
  source_family: normal
  tau: 0.25
  fit_size: 5000
  beta_prior_type: rhs_ns
  seed: 123
  reservoir_profile: tiny_d1_n8
  enabled: true
  source_reference_priors: default
  source_current_rhsns_member: false
  source_legacy_rhs_member: false

reference:
  dynamic_root: /home/jaguir26/local/src/exdqlm__wt__dqlm-conjugacy-cavi-gibbs/results/function_testing_20260309_dynamic_dlm_family_qspec

reference_contract:
  root_kind: dynamic
  scenarios: [dlm_constV_smallW]
  families: [gausmix, laplace, normal]
  taus: [0.05, 0.25, 0.95]
  fit_sizes: [500, 5000]
  expected_reference_roots: 18
  expected_unique_dataset_cells: 18
  expected_qdesn_roots: 36
  expected_priors: [ridge, rhs_ns]

smoke:
  scenario: dlm_constV_smallW
  family: normal
  tau: 0.25
  fit_sizes: [500, 5000]
  priors: [ridge, rhs_ns]

runtime:
  threads: 1
  campaign_workers: 6
  workers: 6

signoff:
  vb:
    tail_window: 5
    min_trace_length: 5
    elbo_rel_range_pass: 0.01
    elbo_rel_range_warn: 0.05
    core_rel_range_pass: 0.02
    core_rel_range_warn: 0.10
    rhs_rel_range_pass: 0.05
    rhs_rel_range_warn: 0.20
    require_converged_for_pass: true
  mcmc:
    min_keep_pass: 160
    min_keep_warn: 100
    ess_pass: 30
    ess_warn: 10
    acf1_pass: 0.90
    acf1_warn: 0.98
    geweke_absz_pass: 2.0
    geweke_absz_warn: 3.0
    half_drift_pass: 0.25
    half_drift_warn: 0.50

reservoir_profiles:
  tiny_d1_n8:
    D: 1
    "n": [8]
    n_tilde: []
    m: 4
    alpha: 0.2
    rho: 0.9
    act_f: tanh
    act_k: identity
    pi_w: 0.15
    pi_in: 1.0
    washout: 4
    add_bias: true
    seed: 123

external_data:
  holdout_n: 1
  y_column: "y"
  q_true_column: "q_true"
  source_index_column: "source_index"

preproc:
  scale_y: true
  scale_x: true

lags:
  m_y: 12
  m_x: 0

pipeline:
  verbose: true
  readout:
    include_input: true
    reservoir_lags: 1
    input_position: after_reservoir
    input_mode: raw_y_lags
  decomposition:
    enabled: false
  sampling:
    nd_draws: 96
    chunk: 48
  forecast:
    mode: origin
    train_last_window: 18
    fore_last_window: 18
  synthesis:
    isotonic: false
    rearrange: false
    grid_M: 151
    n_samp: 96
    seed: 321
  diagnostics:
    calibration: false
    pit: false
    scores: true
    lead_eval: false
    fan_charts: false
    plots: false
  cpp:
    use_postpred: false
    postpred_omp: false
    postpred_precompute: false
    postpred_threads: 1
  outputs:
    save: true
    keep_draws: false
    thesis_subset: false
  inference:
    likelihood_family: exal
    readout_scale: true
    vb:
      max_iter: 40
      min_iter_elbo: 10
      n_samp_xi: 80
      verbose: true
      diagnostics:
        rhs_trace: true
        rhs_deep: false
      rhs:
        freeze_tau_iters: 10
        freeze_tau_warmup_iters: 10
        tau_local_tol: 5.0e-4
        min_tau_updates: 2
        force_tau_after_warmup: true
      prior_overrides:
        ridge:
          max_iter: 40
          min_iter_elbo: 10
          n_samp_xi: 80
        rhs_ns:
          max_iter: 60
          min_iter_elbo: 12
          n_samp_xi: 128
          rhs:
            freeze_tau_iters: 10
            freeze_tau_warmup_iters: 10
            tau_local_tol: 5.0e-4
            min_tau_updates: 2
            force_tau_after_warmup: true
      priors:
        gamma:
          mu0: 0
          s20: 10
        sigma:
          a: 1
          b: 1
        beta:
          ridge:
            tau2: 20
          rhs_ns:
            tau0: 0.01
            a_zeta: 2.0
            b_zeta: 1.0
            s2: 0.5
            shrink_intercept: false
            intercept_prec: 1.0e-10
            n_inner: 2
            var_floor: 1.0e-8
            init_log_tau: null
            init_log_lambda: 0.0
            init_log_c2: 0.0
    mcmc:
      n_burn: 300
      n_mcmc: 600
      thin: 1
      verbose: true
      progress_every: 50
      init_from_vb: true
      store_latent_draws: false
      store_rhs_draws: false
      transforms:
        use_log_sigma: true
        sigma_eta_bounds: [-10, 10]
      slice:
        width_gamma: 0.45
        width_sigma: 0.35
        width_rhs_lambda: 0.6
        width_rhs_tau: 0.6
        width_rhs_c2: 0.6
        core_extra_passes: 1
        max_steps_out: 55
        max_shrink: 210
      prior_overrides:
        ridge:
          n_burn: 500
          n_mcmc: 1000
          progress_every: 100
          slice:
            core_update_mode: sigma_then_gamma
            width_gamma: 0.53
            width_sigma: 0.20
            core_extra_passes: 2
            max_steps_out: 70
            max_shrink: 280
            max_steps_out_sigma: 150
            max_shrink_sigma: 400
        rhs_ns:
          n_burn: 500
          n_mcmc: 1000
          progress_every: 100
          rhs:
            freeze_tau_burnin_iters: 80
            freeze_tau_only_during_burn: true
            width_adapt:
              enabled: true
              warmup_iters: 350
              only_during_burn: true
              target_score_low: -0.75
              target_score_high: 0.75
              step_size: 0.015
              width_min: 0.02
              width_max: 1.8
          slice:
            width_gamma: 0.42
            width_sigma: 0.32
            width_rhs_lambda: 0.18
            width_rhs_tau: 0.12
            width_rhs_c2: 0.08
            width_rhs_tau_c2_block: 0.26
            rhs_global_block_update: transformed_tau_c2_block
            rhs_transformed_block_passes: 4
            width_rhs_tau_c2_transformed_z1: 0.22
            width_rhs_tau_c2_transformed_z2: 0.18
            max_steps_out: 70
            max_shrink: 260
            core_update_mode: sigma_then_gamma
            core_extra_passes: 2
            max_steps_out_sigma: 130
            max_shrink_sigma: 360
      priors:
        gamma:
          mu0: 0
          s20: 10
        sigma:
          a: 1
          b: 1
        beta:
          ridge:
            tau2: 20
          rhs_ns:
            tau0: 0.01
            a_zeta: 2.0
            b_zeta: 1.0
            s2: 0.5
            shrink_intercept: false
            intercept_prec: 1.0e-10
            n_inner: 2
            var_floor: 1.0e-8
