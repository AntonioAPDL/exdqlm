profiles:
  - profile_id: R810_ridge_combo192_soft2600
    label: Ridge Combo192 Soft2600
    rationale: >
      Smallest clean extension of the current N750 ridge winner: keep the same ridge VB guard and
      simply deepen the ridge MCMC chain with slightly softer gamma/sigma widths.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_192
          mcmc:
            prior_overrides:
              ridge: *ridge_softgamma_2600

  - profile_id: R820_ridge_combo224_soft2600
    label: Ridge Combo224 Soft2600
    rationale: >
      Add a modestly stronger ridge VB guard while preserving the same deeper soft MCMC geometry in
      case the last ridge row still has some coupled VB tail sensitivity.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_224
          mcmc:
            prior_overrides:
              ridge: *ridge_softgamma_2600

  - profile_id: R830_ridge_combo224_soft2800
    label: Ridge Combo224 Soft2800
    rationale: >
      Deeper ridge chain hedge for the long upper-tail row if the surviving Geweke issue is still
      primarily under-mixing rather than a geometry defect.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_224
          mcmc:
            prior_overrides:
              ridge: *ridge_softgamma_2800

  - profile_id: R840_ridge_combo224_diag2600
    label: Ridge Combo224 Diag2600
    rationale: >
      Diagnostic ridge combo candidate with narrower gamma/sigma geometry and one extra core pass,
      aimed directly at the remaining `laplace tau=0.95` Geweke drift row.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_224
          mcmc:
            prior_overrides:
              ridge: *ridge_diag_2600

  - profile_id: R850_ridge_combo256_diag3000
    label: Ridge Combo256 Diag3000
    rationale: >
      Strongest final ridge hedge: strongest retained ridge VB guard plus the deepest and narrowest
      ridge MCMC geometry in this neighborhood.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_256
          mcmc:
            prior_overrides:
              ridge: *ridge_diag_3000

  - profile_id: R910_rhs_long_guard224_narrow2800
    label: RHS Long Guard224 Narrow2800
    rationale: >
      First clean extension of the current N930 rhs long winner: preserve the current rhs VB guard,
      deepen the chain, and narrow the transformed-block geometry for the missing-diagnostics rows.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              rhs_ns: *rhs_vb_guard_224
          mcmc:
            prior_overrides:
              rhs_ns: *rhs_long_narrow_2800

  - profile_id: R920_rhs_long_guard224_balanced3000
    label: RHS Long Guard224 Balanced3000
    rationale: >
      Balanced rhs long hedge that increases both depth and warmup while staying less aggressive
      than the full diagnostic schedule.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              rhs_ns: *rhs_vb_guard_224
          mcmc:
            prior_overrides:
              rhs_ns: *rhs_long_balanced_3000

  - profile_id: R930_rhs_long_guard224_diag3000
    label: RHS Long Guard224 Diag3000
    rationale: >
      Stronger diagnostics-oriented rhs long profile retained because the two exAL residual rows
      currently fail with `missing_chain_diagnostics` rather than ordinary half-chain drift.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              rhs_ns: *rhs_vb_guard_224
          mcmc:
            prior_overrides:
              rhs_ns: *rhs_long_diag_3000

  - profile_id: R940_rhs_long_guard224_burnheavy3200
    label: RHS Long Guard224 Burnheavy3200
    rationale: >
      Longest same-neighborhood rhs hedge in case the remaining AL drift row is still burn-limited
      even under the current N930 schedule.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              rhs_ns: *rhs_vb_guard_224
          mcmc:
            prior_overrides:
              rhs_ns: *rhs_long_burnheavy_3200

  - profile_id: R950_rhs_long_guard256_diag3200
    label: RHS Long Guard256 Diag3200
    rationale: >
      Strongest final rhs hedge: one stronger retained rhs VB guard plus the deepest diagnostic
      MCMC schedule, included once to test whether the remaining residual is still partially
      coupled to guard stability.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              rhs_ns: *rhs_vb_guard_256
          mcmc:
            prior_overrides:
              rhs_ns: *rhs_long_diag_3200

stages:
  - id: R1_ridge_upper_tail_long_final
    label: Ridge Upper-Tail Long MCMC Final
    rationale: >
      Final ridge residual stage. The promoted Wave 1 baseline already solved the ridge VB debt, so
      only the long-horizon ridge `mcmc_exal` upper-tail row remains. Use the full W4 guard set but
      retune only inside the current N750 ridge combo neighborhood.
    profile_ids:
      - R810_ridge_combo192_soft2600
      - R820_ridge_combo224_soft2600
      - R830_ridge_combo224_soft2800
      - R840_ridge_combo224_diag2600
      - R850_ridge_combo256_diag3000
    selection_metric: target_fit_fail_n
    include_root_ids:
      - root__dynamic__dlm_constV_smallW__gausmix__tau_0p95__lasttt_5000__qdesn_ridge
      - root__dynamic__dlm_constV_smallW__laplace__tau_0p95__lasttt_5000__qdesn_ridge
      - root__dynamic__dlm_constV_smallW__normal__tau_0p95__lasttt_5000__qdesn_ridge
    target_selector:
      prior: [ridge]
      inference: [mcmc]
      model: [exal]
      tau: [0.95]
      fit_size: [5000]
      signoff_grade: [FAIL]

  - id: R2_rhs_long_mcmc_residual_final
    label: RHS Long-Horizon MCMC Residual Final
    rationale: >
      Final rhs residual stage. The promoted Wave 1 baseline already solved the short-horizon rhs
      debt and most of the long-horizon mixed exAL band, leaving only three long-horizon MCMC rows.
      Reuse the W6 guard set but stay entirely inside the current N930 rhs long neighborhood.
    profile_ids:
      - R910_rhs_long_guard224_narrow2800
      - R920_rhs_long_guard224_balanced3000
      - R930_rhs_long_guard224_diag3000
      - R940_rhs_long_guard224_burnheavy3200
      - R950_rhs_long_guard256_diag3200
    selection_metric: target_fit_fail_n
    include_root_ids:
      - root__dynamic__dlm_constV_smallW__gausmix__tau_0p05__lasttt_5000__qdesn_rhs_ns
      - root__dynamic__dlm_constV_smallW__gausmix__tau_0p25__lasttt_5000__qdesn_rhs_ns
      - root__dynamic__dlm_constV_smallW__laplace__tau_0p25__lasttt_5000__qdesn_rhs_ns
      - root__dynamic__dlm_constV_smallW__laplace__tau_0p95__lasttt_5000__qdesn_rhs_ns
      - root__dynamic__dlm_constV_smallW__normal__tau_0p25__lasttt_5000__qdesn_rhs_ns
    target_selector:
      prior: [rhs_ns]
      inference: [mcmc]
      fit_size: [5000]
      signoff_grade: [FAIL]
