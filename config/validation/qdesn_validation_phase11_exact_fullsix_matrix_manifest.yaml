profiles:
  - id: R300_r68_exact_anchor
    batch: B0_controls
    family: r68_exact_anchor
    description: Exact replicated R68 ridge-signal family control from Phase 9 and Phase 10.
    patch: *r68_patch

  - id: R301_r65_balanced_control
    batch: B0_controls
    family: r65_balanced_control
    description: Exact replicated R65 ridge-chain family control from Phase 9 and Phase 10.
    patch: *r65_patch

  - id: R302_r61_runtime_reference
    batch: B0_controls
    family: r61_runtime_reference
    description: Exact replicated R61 runtime-reference control.
    patch: *r61_patch

  - id: R310_r68_pass1_chain1000
    batch: B1_r68_exact_neighborhood
    family: r68_pass1_chain1000
    description: Exact full-6 test of the strongest Phase-10 R68 local winner.
    patch: *r68_pass1_chain1000_patch

  - id: R311_r68_pass1_chain1000_rhsfreeze100_softblock
    batch: B1_r68_exact_neighborhood
    family: r68_pass1_chain1000_rhsfreeze100_softblock
    description: R68 pass1-chain1000 with mild rhs guard added to protect sentinel behavior.
