stages:
  - id: S1_exact_fullsix_matrix
    description: Broad exact full-6 matrix that forces every challenger through the real branch-facing harness.
    profile_source: all_candidates
    selector:
      mode: explicit_roots
      roots:
        - scenario: dlm_ar1V
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_bigW
          tau: 0.05
          likelihood_family: exal
          beta_prior_type: ridge
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_bigW
          tau: 0.95
          likelihood_family: al
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.50
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: ridge
          seed: 123
          reservoir_profile: tiny_d1_n8
    advance:
      type: rank_filter_top_n
      top_n: 5
      max_total_fail_n: 4
      max_sentinel_fail_n: 1
      max_runtime_inflation: 1.30
      min_fail_reduction: 0.333
      min_severe_improved_n: 1
      reference_profile_id: R300_r68_exact_anchor
      require_not_worse_than_reference: true

  - id: S2_rerun_confirmation
    description: Exact rerun confirmation for Stage-1 survivors against the same full-6 reference harness.
    profile_source: selected_from_previous
    selector:
      mode: all
    advance:
      type: rank_filter_top_n
      top_n: 3
      max_total_fail_n: 3
      max_sentinel_fail_n: 0
      max_runtime_inflation: 1.20
      min_fail_reduction: 0.50
      min_severe_improved_n: 1
      reference_profile_id: R300_r68_exact_anchor
      require_better_than_reference: true

  - id: S3_stability_confirmation
    description: Exact full-6 stability rerun of the confirmation survivors before any promotion decision.
    profile_source: selected_from_previous
    selector:
      mode: all
    advance:
      type: report_only
