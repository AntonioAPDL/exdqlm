profiles:
  - id: R600_r512_promoted_anchor
    batch: B0_controls
    family: r512_promoted_anchor
    description: Promoted Phase-13 winner retained as the new active baseline.
    patch: *r600_patch

  - id: R601_r500_previous_anchor
    batch: B0_controls
    family: r500_previous_anchor
    description: Previous Phase-13 anchor retained as the direct comparison control.
    patch: *r601_patch

  - id: R602_r402_balanced_control
    batch: B0_controls
    family: r402_balanced_control
    description: Clean balanced control retained for runtime and sentinel discipline.
    patch: *r602_patch

  - id: R610_r512_chain1050
    batch: B1_r512_ridge_chain
    family: r512_chain1050
    description: Small keep-size increase around the promoted R512 lead.
    patch: *r610_patch

  - id: R611_r512_chain1100
    batch: B1_r512_ridge_chain
    family: r512_chain1100
    description: Slightly larger keep-size increase around the promoted R512 lead.
    patch: *r611_patch

  - id: R612_r512_burn550_chain1100
    batch: B1_r512_ridge_chain
    family: r512_burn550_chain1100
    description: Longer chain plus slightly deeper burn-in around the promoted R512 lead.
    patch: *r612_patch

  - id: R613_r512_pass3_chain1000
    batch: B1_r512_ridge_chain
    family: r512_pass3_chain1000
    description: One additional ridge core pass beyond the promoted winner.
    patch: *r613_patch

  - id: R614_r512_steps80
    batch: B2_r512_ridge_geometry
    family: r512_steps80
    description: Modestly wider ridge step-out budget around the promoted lead.
    patch: *r614_patch

  - id: R615_r512_steps80_chain1100
    batch: B2_r512_ridge_geometry
    family: r512_steps80_chain1100
    description: Modestly wider ridge step-out budget plus a small keep-size increase.
    patch: *r615_patch

  - id: R616_r512_softgamma_steps80
    batch: B2_r512_ridge_geometry
    family: r512_softgamma_steps80
    description: Slightly softer ridge widths plus the wider step-out budget.
    patch: *r616_patch

  - id: R620_r512_rhsfreeze90
    batch: B3_r512_rhs_local
    family: r512_rhsfreeze90
    description: Mild increase in tau freeze during burn-in around the promoted lead.
    patch: *r620_patch

  - id: R621_r512_rhsfreeze100
    batch: B3_r512_rhs_local
    family: r512_rhsfreeze100
    description: Slightly stronger tau freeze without reopening the trimmed R421 family.
    patch: *r621_patch

  - id: R622_r512_rhssoft_freeze90
    batch: B3_r512_rhs_local
    family: r512_rhssoft_freeze90
    description: Mild tau freeze plus slightly softer rhs slice widths.
    patch: *r622_patch

  - id: R630_r512_chain1100_rhsfreeze90
    batch: B4_r512_coupled
    family: r512_chain1100_rhsfreeze90
    description: Slightly longer-chain ridge variant plus mild rhs freeze.
    patch: *r630_patch

  - id: R631_r512_steps80_rhsfreeze90
    batch: B4_r512_coupled
    family: r512_steps80_rhsfreeze90
    description: Wider ridge step-out variant plus mild rhs freeze.
    patch: *r631_patch

stages:
  - id: S1_exact_fullsix_residual_resolution
    description: Broad exact full-6 residual-resolution matrix around the promoted R512 baseline.
    profile_source: all_candidates
    selector:
      mode: explicit_roots
      roots:
        - scenario: dlm_ar1V
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_bigW
          tau: 0.05
          likelihood_family: exal
          beta_prior_type: ridge
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_bigW
          tau: 0.95
          likelihood_family: al
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.50
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: ridge
          seed: 123
          reservoir_profile: tiny_d1_n8
    advance:
      type: rank_filter_top_n
      top_n: 6
      max_total_fail_n: 3
      max_sentinel_fail_n: 0
      max_runtime_inflation: 1.35
      min_fail_reduction: 0.500
      min_severe_improved_n: 1
      reference_profile_id: R600_r512_promoted_anchor
      require_not_worse_than_reference: true

  - id: S2_rerun_confirmation
    description: Exact rerun confirmation of the strongest residual-resolution survivors.
    profile_source: selected_from_previous
    selector:
      mode: all
    advance:
      type: rank_filter_top_n
      top_n: 4
      max_total_fail_n: 3
      max_sentinel_fail_n: 0
      max_runtime_inflation: 1.35
      min_fail_reduction: 0.500
      min_severe_improved_n: 1
      reference_profile_id: R600_r512_promoted_anchor
      require_better_than_reference: true

  - id: S3_final_residual_confirmation
    description: Final exact rerun of the confirmation survivors with a true residual-set reduction requirement.
    profile_source: selected_from_previous
    selector:
      mode: all
    advance:
      type: rank_filter_top_n
      top_n: 2
      max_total_fail_n: 2
      max_sentinel_fail_n: 0
      max_runtime_inflation: 1.35
      min_fail_reduction: 0.667
      min_severe_improved_n: 1
      reference_profile_id: R600_r512_promoted_anchor
      require_better_than_reference: true
