meta:
  name: qdesn_validation_phase14_r512_residual_resolution_20260403
  display_name: QDESN Phase 14 R512 Residual Resolution
  purpose: >
    Three-stage exact full-6 residual-resolution wave rooted in the promoted Phase-13 winner R512.
    Stage 1 runs a broad but disciplined local matrix, Stage 2 reruns the strongest survivors,
    and Stage 3 requires a true residual-set reduction before any new promotion decision.
  branch: feature/qdesn-mcmc-alternative
  safe_default: prepare_only

inputs:
  phase01_manifest: reports/qdesn_mcmc_validation/finalization_closeout-rhsfixrelaunch-20260329b__git-6ac4727/summary/phase01_manifest.json
  base_defaults: config/validation/qdesn_dynamic_family_prior_repair_defaults.yaml

outputs:
  report_root: reports/qdesn_mcmc_validation/qdesn_validation_phase14_r512_residual_resolution
  results_root: results/qdesn_mcmc_validation/qdesn_validation_phase14_r512_residual_resolution

controls:
  anchor_profile_id: R600_r512_promoted_anchor
  resume_completed_stages: true
  create_plots: false
  profile_verbose: true
  campaign_workers: 6
  threads_per_worker: 1
  profile_timeout_minutes: 240
  timeout_kill_after_seconds: 30
  continue_on_profile_error: true
  max_timeout_profiles: 4
  max_error_profiles: 4
  stop_on_anchor_operational_failure: true

batches:
  - id: B0_controls
    description: Promoted anchor, previous anchor, and clean balanced control.
  - id: B1_r512_ridge_chain
    description: Longer-chain and extra-pass ridge descendants around the promoted R512 lead.
  - id: B2_r512_ridge_geometry
    description: Modest ridge geometry descendants around the promoted R512 lead.
  - id: B3_r512_rhs_local
    description: Mild rhs-local descendants around the promoted R512 lead.
  - id: B4_r512_coupled
    description: Very small coupled descendants combining the strongest ridge and mild rhs levers.

shared_patches:
  logsigma: &logsigma
    use_log_sigma: true
    sigma_eta_bounds: [-10, 10]

  width_adapt_350: &width_adapt_350
    enabled: true
    warmup_iters: 350
    only_during_burn: true
    target_score_low: -0.75
    target_score_high: 0.75
    step_size: 0.015
    width_min: 0.02
    width_max: 1.8

  width_adapt_360: &width_adapt_360
    enabled: true
    warmup_iters: 360
    only_during_burn: true
    target_score_low: -0.75
    target_score_high: 0.75
    step_size: 0.015
    width_min: 0.02
    width_max: 1.8

  width_adapt_400: &width_adapt_400
    enabled: true
    warmup_iters: 400
    only_during_burn: true
    target_score_low: -0.75
    target_score_high: 0.75
    step_size: 0.015
    width_min: 0.02
    width_max: 1.8

  rhs_slice_base: &rhs_slice_base
    core_update_mode: sigma_then_gamma
    width_gamma: 0.42
    width_sigma: 0.32
    width_rhs_lambda: 0.18
    width_rhs_tau: 0.12
    width_rhs_c2: 0.08
    width_rhs_tau_c2_block: 0.26
    rhs_global_block_update: transformed_tau_c2_block
    rhs_transformed_block_passes: 4
    width_rhs_tau_c2_transformed_z1: 0.22
    width_rhs_tau_c2_transformed_z2: 0.18
    core_extra_passes: 2
    max_steps_out: 70
    max_shrink: 260
    max_steps_out_sigma: 130
    max_shrink_sigma: 360

  rhs_slice_soft: &rhs_slice_soft
    core_update_mode: sigma_then_gamma
    width_gamma: 0.40
    width_sigma: 0.30
    width_rhs_lambda: 0.16
    width_rhs_tau: 0.10
    width_rhs_c2: 0.07
    width_rhs_tau_c2_block: 0.24
    rhs_global_block_update: transformed_tau_c2_block
    rhs_transformed_block_passes: 4
    width_rhs_tau_c2_transformed_z1: 0.20
    width_rhs_tau_c2_transformed_z2: 0.16
    core_extra_passes: 2
    max_steps_out: 70
    max_shrink: 260
    max_steps_out_sigma: 130
    max_shrink_sigma: 360

  rhs_base: &rhs_base
    n_burn: 500
    n_mcmc: 1000
    progress_every: 100
    rhs:
      freeze_tau_burnin_iters: 80
      freeze_tau_only_during_burn: true
      width_adapt: *width_adapt_350
    slice: *rhs_slice_base

  rhs_freeze90: &rhs_freeze90
    n_burn: 525
    n_mcmc: 1000
    progress_every: 100
    rhs:
      freeze_tau_burnin_iters: 90
      freeze_tau_only_during_burn: true
      width_adapt: *width_adapt_360
    slice: *rhs_slice_base

  rhs_freeze100: &rhs_freeze100
    n_burn: 550
    n_mcmc: 1000
    progress_every: 100
    rhs:
      freeze_tau_burnin_iters: 100
      freeze_tau_only_during_burn: true
