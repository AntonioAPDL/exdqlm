meta:
  name: qdesn_validation_phase3_family_b_screen_20260331
  purpose: >
    Broad but stage-gated Family-B screen for the next QDESN repair wave. Focuses on the untested
    transformed-sigma shared-core family, with optional QR support, while avoiding already rejected
    standalone conditioning and legacy bridge-only sweeps.
  branch: feature/qdesn-mcmc-alternative
  safe_default: prepare_only

inputs:
  phase01_manifest: reports/qdesn_mcmc_validation/finalization_closeout-rhsfixrelaunch-20260329b__git-6ac4727/summary/phase01_manifest.json
  base_defaults: config/validation/qdesn_dynamic_family_prior_repair_defaults.yaml

outputs:
  report_root: reports/qdesn_mcmc_validation/qdesn_validation_phase3_family_b_screen
  results_root: results/qdesn_mcmc_validation/qdesn_validation_phase3_family_b_screen

controls:
  anchor_profile_id: R0_legacy_anchor
  resume_completed_stages: true
  create_plots: false
  profile_verbose: true
  campaign_workers: 4
  threads_per_worker: 1
  profile_timeout_minutes: 70
  timeout_kill_after_seconds: 30
  continue_on_profile_error: true
  max_timeout_profiles: 3
  max_error_profiles: 4
  stop_on_anchor_operational_failure: true

batches:
  - id: B0_logsigma_core
    description: Unconditioned transformed-sigma shared-core reparameterization candidates.
  - id: B1_logsigma_qr_support
    description: QR-supported transformed-sigma candidates to test whether geometry helps the new family.

profiles:
  - id: R0_legacy_anchor
    batch: B0_logsigma_core
    family: anchor
    description: Preserve the historical pre-repair validation controls for an apples-to-apples anchor on current code.
    patch:
      pipeline:
        inference:
          mcmc:
            slice:
              core_update_mode: sigma_then_gamma
              width_gamma: 0.60
              width_sigma: 0.35
              core_extra_passes: 0
              max_steps_out: 40
              max_shrink: 150
            prior_overrides:
              ridge:
                slice:
                  core_update_mode: sigma_then_gamma
                  width_gamma: 0.60
                  width_sigma: 0.35
                  max_steps_out: 40
                  max_shrink: 150
              rhs_ns:
                slice:
                  core_update_mode: sigma_then_gamma
                  width_gamma: 0.60
                  width_sigma: 0.35
                  max_steps_out: 50
                  max_shrink: 200

  - id: R7_logsigma_base
    batch: B0_logsigma_core
    family: transformed_sigma
    description: >
      Exact transformed-sigma reparameterization only. Uses log-sigma slice updates under the historical
      sigma-then-gamma ordering without conditioning support.
    patch:
      pipeline:
        inference:
          mcmc:
            transforms:
              use_log_sigma: true
            slice:
              core_update_mode: sigma_then_gamma
              width_gamma: 0.60
              width_sigma: 0.30
              core_extra_passes: 0
              max_steps_out: 50
              max_shrink: 200
              max_steps_out_sigma: 90
              max_shrink_sigma: 300
            prior_overrides:
              rhs_ns:
                slice:
                  max_steps_out: 60
                  max_shrink: 220
                  max_steps_out_sigma: 110
                  max_shrink_sigma: 320

  - id: R8_logsigma_gamma_focus
    batch: B0_logsigma_core
    family: transformed_sigma
    description: >
      Gamma-focused transformed-sigma candidate: one extra core pass with sharper gamma movement and
      moderate log-sigma width to target the shared low-ESS and high-Geweke failures.
    patch:
      pipeline:
        inference:
          mcmc:
            transforms:
              use_log_sigma: true
            slice:
              core_update_mode: sigma_then_gamma
              width_gamma: 0.45
              width_sigma: 0.30
              core_extra_passes: 1
              max_steps_out: 55
              max_shrink: 220
              max_steps_out_sigma: 90
              max_shrink_sigma: 300
            prior_overrides:
              rhs_ns:
                slice:
                  max_steps_out: 65
                  max_shrink: 240
                  max_steps_out_sigma: 110
                  max_shrink_sigma: 320

  - id: R10_logsigma_bridge
    batch: B0_logsigma_core
    family: transformed_sigma
    description: >
      Reparameterized bridge candidate: combine log-sigma updates with the previously untested extra-gamma
      bridge sequence, but without conditioning support.
    patch:
      pipeline:
        inference:
          mcmc:
            transforms:
              use_log_sigma: true
            slice:
              core_update_mode: gamma_sigma_gamma
              width_gamma: 0.50
              width_sigma: 0.30
              core_extra_passes: 0
              max_steps_out: 55
              max_shrink: 220
              max_steps_out_sigma: 90
              max_shrink_sigma: 300
            prior_overrides:
              rhs_ns:
                slice:
                  max_steps_out: 65
                  max_shrink: 240
                  max_steps_out_sigma: 110
                  max_shrink_sigma: 320

  - id: R12_logsigma_sigma_focus
    batch: B0_logsigma_core
    family: transformed_sigma
    description: >
      Sigma-focused transformed-sigma candidate with tighter log-sigma width and a larger sigma-specific
      step-out budget to directly target the half-drift cluster.
    patch:
      pipeline:
        inference:
          mcmc:
            transforms:
              use_log_sigma: true
            slice:
              core_update_mode: sigma_then_gamma
              width_gamma: 0.55
              width_sigma: 0.22
              core_extra_passes: 0
              max_steps_out: 50
              max_shrink: 210
              max_steps_out_sigma: 110
              max_shrink_sigma: 340
            prior_overrides:
              rhs_ns:
                slice:
                  max_steps_out: 60
                  max_shrink: 230
                  max_steps_out_sigma: 130
                  max_shrink_sigma: 360

  - id: R9_logsigma_gamma_focus_qr
    batch: B1_logsigma_qr_support
    family: transformed_sigma_qr
    description: >
      Gamma-focused transformed-sigma candidate with QR-whitening support. Tests whether the reparameterized
      sigma family benefits from working-space geometry repair as a secondary lever.
    patch:
      pipeline:
        inference:
          mcmc:
            transforms:
              use_log_sigma: true
            conditioning:
              mode: qr_whiten
              intercept_column: 1
              gram_ridge: 1.0e-08
            slice:
              core_update_mode: sigma_then_gamma
              width_gamma: 0.45
              width_sigma: 0.30
              core_extra_passes: 1
              max_steps_out: 55
              max_shrink: 220
              max_steps_out_sigma: 90
              max_shrink_sigma: 300
            prior_overrides:
              rhs_ns:
                conditioning:
                  mode: qr_whiten
                  intercept_column: 1
                  gram_ridge: 1.0e-08
                slice:
                  max_steps_out: 65
                  max_shrink: 240
                  max_steps_out_sigma: 110
                  max_shrink_sigma: 320

  - id: R11_logsigma_bridge_qr
    batch: B1_logsigma_qr_support
    family: transformed_sigma_qr
    description: >
      Reparameterized bridge candidate plus QR-whitening support. Tests whether the bridge family only becomes
      viable once sigma is transformed and geometry is cleaned up together.
    patch:
      pipeline:
        inference:
          mcmc:
            transforms:
              use_log_sigma: true
            conditioning:
              mode: qr_whiten
              intercept_column: 1
              gram_ridge: 1.0e-08
            slice:
              core_update_mode: gamma_sigma_gamma
              width_gamma: 0.50
              width_sigma: 0.30
              core_extra_passes: 0
              max_steps_out: 55
              max_shrink: 220
              max_steps_out_sigma: 90
              max_shrink_sigma: 300
            prior_overrides:
              rhs_ns:
                conditioning:
                  mode: qr_whiten
                  intercept_column: 1
                  gram_ridge: 1.0e-08
                slice:
                  max_steps_out: 65
                  max_shrink: 240
                  max_steps_out_sigma: 110
                  max_shrink_sigma: 320

  - id: R13_logsigma_sigma_focus_qr
    batch: B1_logsigma_qr_support
    family: transformed_sigma_qr
    description: >
      Sigma-focused transformed-sigma candidate with QR support. Targets the half-drift cluster while giving
      the readout block the best working-space geometry we currently know how to provide.
    patch:
      pipeline:
        inference:
          mcmc:
            transforms:
              use_log_sigma: true
            conditioning:
              mode: qr_whiten
              intercept_column: 1
              gram_ridge: 1.0e-08
            slice:
              core_update_mode: sigma_then_gamma
              width_gamma: 0.55
              width_sigma: 0.22
              core_extra_passes: 0
              max_steps_out: 50
              max_shrink: 210
              max_steps_out_sigma: 110
              max_shrink_sigma: 340
            prior_overrides:
              rhs_ns:
                conditioning:
                  mode: qr_whiten
                  intercept_column: 1
                  gram_ridge: 1.0e-08
                slice:
                  max_steps_out: 60
                  max_shrink: 230
                  max_steps_out_sigma: 130
                  max_shrink_sigma: 360

  - id: R14_logsigma_bridge_pass1_qr
    batch: B1_logsigma_qr_support
    family: transformed_sigma_qr
    description: >
      Broadest Family-B candidate in this sweep: transformed sigma, bridge ordering, one extra core pass,
      and QR support. Included as the high-ambition edge of the search, not as a default guess.
    patch:
      pipeline:
        inference:
          mcmc:
            transforms:
              use_log_sigma: true
            conditioning:
              mode: qr_whiten
              intercept_column: 1
              gram_ridge: 1.0e-08
            slice:
              core_update_mode: gamma_sigma_gamma
              width_gamma: 0.50
              width_sigma: 0.28
              core_extra_passes: 1
              max_steps_out: 60
              max_shrink: 240
              max_steps_out_sigma: 100
              max_shrink_sigma: 320
            prior_overrides:
              rhs_ns:
                conditioning:
                  mode: qr_whiten
                  intercept_column: 1
                  gram_ridge: 1.0e-08
                slice:
                  max_steps_out: 70
                  max_shrink: 260
                  max_steps_out_sigma: 120
                  max_shrink_sigma: 340

stages:
  - id: S1_canary_screen
    description: Broad candidate screen on the persistent hard canary.
    profile_source: all_candidates
    selector:
      mode: exact_root
      scenario: dlm_constV_bigW
      tau: 0.05
      likelihood_family: exal
      beta_prior_type: ridge
      seed: 123
      reservoir_profile: tiny_d1_n8
    advance:
      type: canary_filter_top_n
      top_n: 3
      min_prof_ess_core: 5.0
      min_ess_ratio: 0.80
      max_prof_geweke_absz: 3.5
      min_geweke_improvement_abs: 2.0
      max_prof_half_drift: 1.00
      max_delta_half_drift_increase: 0.35
      max_runtime_inflation: 0.60

  - id: S2_severe_quartet
    description: Advance only the best canary survivors to the severe quartet.
    profile_source: selected_from_previous
    selector:
      mode: failure_cluster
      failure_clusters: [all_four]
    advance:
      type: rank_filter_top_n
      top_n: 2
      max_severe_fail_n: 3
      max_total_fail_n: 5
      max_runtime_inflation: 0.60
      min_fail_reduction: 0.10
      min_severe_improved_n: 1

  - id: S3_full_six_final
    description: Run the finalists on the full fixed 6-root harness.
    profile_source: selected_from_previous
    selector:
      mode: all
    advance:
      type: report_only
