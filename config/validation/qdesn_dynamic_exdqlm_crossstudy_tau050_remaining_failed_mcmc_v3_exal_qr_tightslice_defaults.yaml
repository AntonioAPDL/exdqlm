campaign:
  name: qdesn_dynamic_exdqlm_crossstudy_tau050_remaining_failed_mcmc_v3_matrix_validation
  results_root: results/qdesn_mcmc_validation/dynamic_exdqlm_crossstudy_tau050_remaining_failed_mcmc_v3_matrix_validation
  reports_root: reports/qdesn_mcmc_validation/dynamic_exdqlm_crossstudy_tau050_remaining_failed_mcmc_v3_matrix_validation

grid:
  source_mode: materialized_source_inputs

execution:
  methods: [vb, mcmc]
  likelihood_families: [exal, al]
  seed_policy:
    mode: deterministic_per_root
    base_seed: 41000

study_contract:
  core_lane: false
  id: tau050_remaining_failed_mcmc_v3_exal_qr_tightslice
  description: |
    Remaining-failed MCMC v3 matrix arm for the dynamic-only QDESN tau050
    study. This EXAL-focused arm keeps latent-v rescue and tests whether QR
    whitening plus tighter slice widths stabilize the hardest EXAL unresolved
    pocket without changing the broader warmup baseline.
  budget:
    posterior_metric_draws: 20000
    vb_sampling_nd_draws: 20000
    vb_synthesis_n_samp: 20000
    mcmc_n_burn: 5000
    mcmc_n_mcmc: 20000
    mcmc_thin: 1
  vb:
    method: LDVB
    profile_id: qdesn_ldvb_remaining_failed_mcmc_v3_exal_qr_tightslice
    sigmagam:
      freeze_warmup_iters: 20
      force_after_warmup: true
      postwarmup_damping: 0.35
      postwarmup_damping_iters: 10
      min_postwarmup_updates: 3
  mcmc:
    kernel: slice
    require_slice: true
    require_init_from_vb: true
    banned_proposals: [rw, laplace_rw]
    sigmagam:
      freeze_burnin_iters: 500
      freeze_only_during_burn: true
      force_after_warmup: true
      delay_adapt_until_after_warmup: true
      delay_laplace_refresh_until_after_warmup: true
    latent_v:
      enabled: true
      freeze_burnin_iters: 50
      freeze_only_during_burn: true
      sparse_update_every: 10
      sparse_update_until_iter: 500
      force_first_postwarmup_update: true
      rescue_on_invalid: true
      rescue_strategy: previous_state
      rescue_max_consecutive: 3
      rescue_burn_only: false
      rescue_force_retry_next_iter: true
      record_rescue_trace: true
      trace: true
    vb_warm_start:
      method: LDVB
      max_iter: 500
      min_iter_elbo: 80
      n_samp_xi: 1000
      sigmagam:
        freeze_warmup_iters: 20
        force_after_warmup: true
        postwarmup_damping: 0.35
        postwarmup_damping_iters: 10
        min_postwarmup_updates: 3

rescue_overlays:
