stages:
  - id: S1_exact_fullsix_sentinel_crossover
    description: Broad exact full-6 crossover matrix around the surviving R512 local signals.
    profile_source: all_candidates
    selector:
      mode: explicit_roots
      roots:
        - scenario: dlm_ar1V
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_bigW
          tau: 0.05
          likelihood_family: exal
          beta_prior_type: ridge
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_bigW
          tau: 0.95
          likelihood_family: al
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.50
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: ridge
          seed: 123
          reservoir_profile: tiny_d1_n8
    advance:
      type: rank_filter_top_n
      top_n: 6
      max_total_fail_n: 3
      max_sentinel_fail_n: 1
      max_runtime_inflation: 1.30
      min_fail_reduction: 0.500
      min_severe_improved_n: 1
      reference_profile_id: R700_r512_anchor_control

  - id: S2_zero_sentinel_rerun_confirmation
    description: Exact rerun confirmation of the strongest crossover survivors with a zero-sentinel requirement.
    profile_source: selected_from_previous
    selector:
      mode: all
    advance:
      type: rank_filter_top_n
      top_n: 4
      max_total_fail_n: 3
      max_sentinel_fail_n: 0
      max_runtime_inflation: 1.30
      min_fail_reduction: 0.500
      min_severe_improved_n: 1
      reference_profile_id: R700_r512_anchor_control

  - id: S3_final_residual_confirmation
    description: Final exact rerun of the zero-sentinel survivors with a 2-fail promotion gate.
    profile_source: selected_from_previous
    selector:
      mode: all
    advance:
      type: rank_filter_top_n
      top_n: 2
      max_total_fail_n: 2
      max_sentinel_fail_n: 0
      max_runtime_inflation: 1.30
      min_fail_reduction: 0.667
      min_severe_improved_n: 1
      reference_profile_id: R700_r512_anchor_control
