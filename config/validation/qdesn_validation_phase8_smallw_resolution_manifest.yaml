meta:
  name: qdesn_validation_phase8_smallw_resolution_20260401
  display_name: QDESN Phase 8 SmallW Resolution Screen
  purpose: >
    Three-stage overnight program built around the stable R61/R44 baseline. Stage 1 searches the two
    remaining smallW fail roots plus the key exal guard rails; Stage 2 confirms the strongest survivors
    on the full fixed 6-root harness; Stage 3 reruns the best confirmation survivors to measure stability.
  branch: feature/qdesn-mcmc-alternative
  safe_default: prepare_only

inputs:
  phase01_manifest: reports/qdesn_mcmc_validation/finalization_closeout-rhsfixrelaunch-20260329b__git-6ac4727/summary/phase01_manifest.json
  base_defaults: config/validation/qdesn_dynamic_family_prior_repair_defaults.yaml

outputs:
  report_root: reports/qdesn_mcmc_validation/qdesn_validation_phase8_smallw_resolution
  results_root: results/qdesn_mcmc_validation/qdesn_validation_phase8_smallw_resolution

controls:
  anchor_profile_id: R80_r61_stable_anchor
  resume_completed_stages: true
  create_plots: false
  profile_verbose: true
  campaign_workers: 4
  threads_per_worker: 1
  profile_timeout_minutes: 180
  timeout_kill_after_seconds: 30
  continue_on_profile_error: true
  max_timeout_profiles: 4
  max_error_profiles: 4
  stop_on_anchor_operational_failure: true

batches:
  - id: B0_controls
    description: Stable baseline and exact signal controls from Phase 7.
  - id: B1_rhs_local
    description: Focused rhs-side cleanup descendants centered on the remaining smallW rhs_ns fail root.
  - id: B2_ridge_local
    description: Focused ridge-side cleanup descendants centered on the remaining smallW ridge fail root.
  - id: B3_combined_local
    description: Disciplined combined descendants that only reuse the strongest surviving local ideas.

profiles:
  - id: R80_r61_stable_anchor
    batch: B0_controls
    family: r61_stable_anchor
    description: Exact Stage-2-stable R61/R44 baseline.
    patch:
      pipeline:
        inference:
          mcmc:
            transforms:
              use_log_sigma: true
              sigma_eta_bounds: [-10, 10]
            prior_overrides:
              ridge:
                n_burn: 450
                n_mcmc: 900
                progress_every: 75
                slice:
                  core_update_mode: sigma_then_gamma
                  width_gamma: 0.55
                  width_sigma: 0.22
                  core_extra_passes: 0
                  max_steps_out: 65
                  max_shrink: 260
                  max_steps_out_sigma: 140
                  max_shrink_sigma: 380
              rhs_ns:
                n_burn: 500
                n_mcmc: 1000
                progress_every: 100
                rhs:
                  freeze_tau_burnin_iters: 80
                  freeze_tau_only_during_burn: true
                  width_adapt:
                    enabled: true
                    warmup_iters: 350
                    only_during_burn: true
                    target_score_low: -0.75
                    target_score_high: 0.75
                    step_size: 0.015
                    width_min: 0.02
                    width_max: 1.8
                slice:
                  core_update_mode: sigma_then_gamma
                  width_gamma: 0.42
                  width_sigma: 0.32
                  width_rhs_lambda: 0.18
                  width_rhs_tau: 0.12
                  width_rhs_c2: 0.08
                  width_rhs_tau_c2_block: 0.26
                  rhs_global_block_update: transformed_tau_c2_block
                  rhs_transformed_block_passes: 4
                  width_rhs_tau_c2_transformed_z1: 0.22
                  width_rhs_tau_c2_transformed_z2: 0.18
                  core_extra_passes: 2
                  max_steps_out: 70
                  max_shrink: 260
                  max_steps_out_sigma: 130
                  max_shrink_sigma: 360

