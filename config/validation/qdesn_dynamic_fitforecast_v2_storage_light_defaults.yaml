campaign:
  name: qdesn_dynamic_fitforecast_v2_validation
  results_root: results/qdesn_mcmc_validation/dynamic_fitforecast_v2_validation
  reports_root: reports/qdesn_mcmc_validation/dynamic_fitforecast_v2_validation
grid:
  source_mode: materialized_source_inputs
execution:
  methods:
  - vb
  - mcmc
  likelihood_families:
  - exal
  - al
  seed_policy:
    mode: deterministic_per_root
    base_seed: 41000
study_contract:
  core_lane: yes
  id: p90_steepertrend_n400m60_fitforecast_main
  description: >-
    Canonical QDESN dynamic relaunch on the promoted period-90 steeper-trend
    dataset surface using the active n400/m60 deep reservoir profile. The main lane
    keeps LDVB everywhere for VB, slice everywhere for MCMC, explicit LDVB warm starts
    for every MCMC fit, normalized warmup defaults, and does not persist MCMC VB-init
    fit artifacts in saved forecast objects. Future launches use analysis retention:
    scalar metrics and compact quantile-path bands are kept, while full successful
    forecast object payloads are pruned after summaries are written.
  budget:
    posterior_metric_draws: 20000
    vb_sampling_nd_draws: 20000
    vb_synthesis_n_samp: 20000
    mcmc_n_burn: 5000
    mcmc_n_mcmc: 20000
    mcmc_thin: 1
  vb:
    method: LDVB
    profile_id: qdesn_ldvb_canonical_v1
    sigmagam:
      freeze_warmup_iters: 10
      force_after_warmup: yes
      postwarmup_damping: 0.5
      postwarmup_damping_iters: 3
      min_postwarmup_updates: 1
  mcmc:
    kernel: slice
    require_slice: yes
    require_init_from_vb: yes
    banned_proposals:
    - rw
    - laplace_rw
    sigmagam:
      freeze_burnin_iters: 50
      freeze_only_during_burn: yes
      force_after_warmup: yes
      delay_adapt_until_after_warmup: yes
      delay_laplace_refresh_until_after_warmup: yes
    vb_warm_start:
      method: LDVB
      max_iter: 300
      min_iter_elbo: 80
      n_samp_xi: 1000
      sigmagam:
        freeze_warmup_iters: 10
        force_after_warmup: yes
        postwarmup_damping: 0.5
        postwarmup_damping_iters: 3
        min_postwarmup_updates: 1
rescue_overlays:
  enabled: no
  mode: explicit_optional
  inventory_csv: config/validation/qdesn_dynamic_exdqlm_crossstudy_effective_w300_postdraw_deepdesn_rowfaithful_multiseed_inventory.csv
  row_overrides_source_defaults: config/validation/qdesn_dynamic_exdqlm_crossstudy_effective_w300_postdraw_deepdesn_rowfaithful_multiseed_defaults.yaml
source_materialization:
  dynamic_root: /data/jaguir26/local/src/shared_dynamic_fit_forecast_validation/sources
  staged_root: results/qdesn_mcmc_validation/dynamic_fitforecast_v2_qdesn_sources
  enforce_effective_train_size: yes
  train_end_source_index: 9000
  forecast_origin_source_index: 9000
  forecast_horizon: 1000
  scenarios: dlm_constV_p90_m0amp_highnoise_steepertrend_v2_TTmain10000_fitforecast
  families:
  - gausmix
  - laplace
  - normal
  taus:
  - 0.05
  - 0.25
  - 0.5
  windows:
  - effective_fit_size: 500
    source_total_size: 1812
    source_dir_name: fit_input_effTT500_totalTT1812_trainEnd9000_H1000
    label: effTT500_totalTT1812_trainEnd9000_H1000
  - effective_fit_size: 5000
    source_total_size: 6312
    source_dir_name: fit_input_effTT5000_totalTT6312_trainEnd9000_H1000
    label: effTT5000_totalTT6312_trainEnd9000_H1000
pilot:
