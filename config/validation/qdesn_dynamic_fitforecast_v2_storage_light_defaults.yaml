    require_lead_export: yes
    forecast_protocol: rolling_origin_no_refit_state_update
    state_update_method: forecast_lattice_observed_lag_state_update_no_refit
    refit_per_origin: no
    max_lead_configured: 30
    origin_stride: 30
  backward_compatible_holdout_alias: forecast_H1000
  posterior_metric_draws: 20000
  qtrue_metrics:
