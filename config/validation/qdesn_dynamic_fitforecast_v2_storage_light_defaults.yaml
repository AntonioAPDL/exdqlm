  - runtime_sec_per_1k_train_eval
runtime:
  threads: 1
  campaign_workers: 30
  workers: 30
  root_scheduler: load_balanced
signoff:
  vb:
    tail_window: 5
    min_trace_length: 5
    elbo_rel_range_pass: 0.01
    elbo_rel_range_warn: 0.05
    core_rel_range_pass: 0.02
    core_rel_range_warn: 0.1
    rhs_rel_range_pass: 0.05
    rhs_rel_range_warn: 0.2
    require_converged_for_pass: yes
  mcmc:
    min_keep_pass: 300
    min_keep_warn: 180
    ess_pass: 30
    ess_warn: 10
    acf1_pass: 0.9
    acf1_warn: 0.98
    geweke_absz_pass: 2.0
    geweke_absz_warn: 3.0
    half_drift_pass: 0.25
    half_drift_warn: 0.5
reservoir_profiles:
  deep_d3_n400x3_skip100_w300_m60:
    D: 3
    'n':
    - 400
    - 400
    - 400
    n_tilde:
    - 400
    - 400
    m: 60
    alpha:
    - 0.3
    - 0.3
    - 0.3
    rho:
    - 0.95
    - 0.95
    - 0.95
    act_f:
    - tanh
    - tanh
    - tanh
    act_k:
    - identity
    - identity
    - identity
    pi_w:
    - 0.1
    - 0.1
    - 0.1
    pi_in:
    - 1.0
    - 1.0
    - 1.0
    washout: 300
    add_bias: yes
    seed: 123
external_data:
  holdout_n: 1000
  y_column: 'y'
  q_true_column: q_true
  source_index_column: source_index
preproc:
  scale_y: yes
  scale_x: yes
lags:
  m_y: 12
  m_x: 0
pipeline:
  verbose: yes
  readout:
    include_input: yes
    reservoir_lags: 1
    input_position: after_reservoir
    input_mode: raw_y_lags
  decomposition:
    enabled: no
  sampling:
    nd_draws: 20000
    chunk: 160
  forecast:
    mode: origin
    protocol: rolling_origin_no_refit_state_update
    horizon: 30
    origin_stride: 30
    primary_lead_export: yes
    train_last_window: 18
    fore_last_window: 18
  ij:
    use_ij_correction: no
    nd_draws: 0
  synthesis:
    isotonic: no
    rearrange: no
    grid_M: 151
    n_samp: 20000
    seed: 321
  diagnostics:
    calibration: no
    pit: no
    scores: yes
    lead_eval: no
    fan_charts: no
    plots: no
  cpp:
    use_postpred: no
    postpred_omp: no
    postpred_precompute: no
