campaign:
  name: qdesn_static_exdqlm_crossstudy_wave6_stall_recovery
  results_root: results/qdesn_mcmc_validation/static_exdqlm_crossstudy_wave6_stall_recovery
  reports_root: reports/qdesn_mcmc_validation/static_exdqlm_crossstudy_wave6_stall_recovery

source:
  run_tag: qdesn-static-exdqlm-crossstudy-wave5-20260405b__git-f2f39d8
  prior_wave_report_root: reports/qdesn_mcmc_validation/static_exdqlm_crossstudy_wave5_remaining_residual_mcmc_closure
  interpretation: wave5_stalled_after_partial_stage1_with_h510_promoted_forward

runtime:
  default_workers: 6
  active_job_workers: 6
  hard_cap_workers: 6

stages:
  - id: S1_ridge_tt1000_remaining_ess_plus_ridge_hardroots
    description: >
      Wave-6 recovery continuation on the long-horizon ridge slice after the valid
      Wave-5 `H510` promotion. The earlier ridge hard-root FAILs are now resolved
      under `H510`, so this historical stage id now carries only the remaining
      ridge `tt=1000` ESS/autocorrelation residual roots.
    control_profile_id: H510_ridge_tt1000_local_control
    stage_selector:
      prior: ridge
      method: mcmc
      model: exal
      signoff_grade: FAIL
      fit_size: 1000
    target_selector:
      prior: ridge
      method: mcmc
      model: exal
      signoff_grade: FAIL
      fit_size: 1000
    selection_metric: target_fit_fail_n
    profile_ids:
      - J530_ridge_tt1000_g530_hybrid_chain1600_retry
      - J540_ridge_tt1000_control_chain1500

  - id: S2_rhs_tt100_remaining_mcmc
    description: >
      Residual rhs_ns MCMC closure on the short-horizon slice after the post-H510
      carry-forward update. The sourced control is retained without rerun, while
      the two previously untested rhs short-horizon challengers are evaluated on
      the remaining drift-heavy residual set only.
    control_profile_id: F610_rhs_tt100_conservative_block
    stage_selector:
      prior: rhs_ns
      method: mcmc
      signoff_grade: FAIL
      fit_size: 100
    target_selector:
      prior: rhs_ns
      method: mcmc
      signoff_grade: FAIL
      fit_size: 100
    selection_metric: target_fit_fail_n
    profile_ids:
      - J620_rhs_tt100_hybrid_chain1250
      - J630_rhs_tt100_drift_guard_plus

  - id: S3_rhs_tt1000_remaining_mcmc_plus_rhs_hardroots
    description: >
      Residual rhs_ns long-horizon closure plus the final unresolved rhs hard-root
      FAIL band. The sourced `F640` control is retained without rerun, and only
      the two remaining high-value rhs long-horizon challengers are launched.
    control_profile_id: F640_rhs_tt1000_chain1200
    stage_selector:
      prior: rhs_ns
      method: mcmc
      signoff_grade: FAIL
      fit_size: 1000
    include_source_root_status_fail_selector:
      beta_prior_type: rhs_ns
      root_kind: static_shrink
      family: laplace
      fit_size: 1000
    target_selector:
      prior: rhs_ns
      method: mcmc
      signoff_grade: FAIL
      fit_size: 1000
    selection_metric: target_fit_fail_n
    profile_ids:
      - J650_rhs_tt1000_hybrid_block_chain1400
      - J660_rhs_tt1000_chain1600_focus

profiles:
  - profile_id: J530_ridge_tt1000_g530_hybrid_chain1600_retry
    label: Ridge tt1000 G530 Hybrid Chain1600 Retry
    rationale: >
      Clean retry of the unresolved Wave-5 `H530` idea. Included because the prior
      attempt stalled before MCMC closeout, so it remains unresolved rather than a
      demonstrated loser.
    overrides:
      pipeline:
        inference:
          mcmc:
            prior_overrides:
              ridge:
                n_burn: 850
                n_mcmc: 1600
                progress_every: 100
                slice:
                  core_update_mode: sigma_then_gamma
                  width_gamma: 0.52
                  width_sigma: 0.20
                  core_extra_passes: 3
                  max_steps_out: 72
                  max_shrink: 300
                  max_steps_out_sigma: 150
                  max_shrink_sigma: 410

  - profile_id: J540_ridge_tt1000_control_chain1500
    label: Ridge tt1000 Control Chain1500
    rationale: >
      Direct `H510`-geometry deeper-chain hedge. Included because the surviving
      long-horizon ridge debt is ESS/autocorrelation-heavy and the first G530
      geometry transplant (`H520`) degraded the slice rather than improving it.
    overrides:
      pipeline:
        inference:
          mcmc:
            prior_overrides:
              ridge:
                n_burn: 750
                n_mcmc: 1500
                progress_every: 100
                slice:
                  core_update_mode: sigma_then_gamma
                  width_gamma: 0.53
                  width_sigma: 0.20
                  core_extra_passes: 3
                  max_steps_out: 74
                  max_shrink: 300
                  max_steps_out_sigma: 155
                  max_shrink_sigma: 420

  - profile_id: J620_rhs_tt100_hybrid_chain1250
    label: RHS tt100 Hybrid Chain1250
    rationale: >
      Conservative transformed-block geometry plus modest chain extension. Still
      untested because Wave 5 stalled before the rhs stages began.
    overrides:
      pipeline:
        inference:
          mcmc:
            prior_overrides:
              rhs_ns:
                n_burn: 700
                n_mcmc: 1250
                progress_every: 100
                transformed_block:
                  enabled: true
                  center: posterior_median
                  widths:
                    beta: 0.27
                    log_sigma: 0.19
                    log_lambda: 0.19
                  extra_passes: 3
                slice:
                  core_update_mode: sigma_then_gamma
                  width_gamma: 0.57
                  width_sigma: 0.20
                  core_extra_passes: 2
                  max_steps_out: 82
                  max_shrink: 300
                  max_steps_out_sigma: 155
                  max_shrink_sigma: 420

  - profile_id: J630_rhs_tt100_drift_guard_plus
    label: RHS tt100 Drift Guard Plus
    rationale: >
      Stronger short-horizon rhs drift guard with tighter transformed-block widths
      and longer burn, without replaying the old chain-only loser.
    overrides:
      pipeline:
        inference:
          mcmc:
            prior_overrides:
              rhs_ns:
                n_burn: 800
                n_mcmc: 1250
                progress_every: 100
                transformed_block:
                  enabled: true
                  center: posterior_median
                  widths:
                    beta: 0.25
                    log_sigma: 0.18
                    log_lambda: 0.18
                  extra_passes: 3
                slice:
                  core_update_mode: sigma_then_gamma
                  width_gamma: 0.55
                  width_sigma: 0.19
                  core_extra_passes: 2
                  max_steps_out: 78
                  max_shrink: 280
                  max_steps_out_sigma: 150
                  max_shrink_sigma: 400

  - profile_id: J650_rhs_tt1000_hybrid_block_chain1400
    label: RHS tt1000 Hybrid Block+Chain1400
    rationale: >
      Long-horizon rhs hybrid that keeps the F640 chain gain but reintroduces the
      tighter transformed-block geometry that remained directionally plausible.
    overrides:
      pipeline:
        inference:
          mcmc:
            prior_overrides:
              rhs_ns:
                n_burn: 800
                n_mcmc: 1400
                progress_every: 100
                transformed_block:
                  enabled: true
                  center: posterior_median
                  widths:
                    beta: 0.26
                    log_sigma: 0.19
                    log_lambda: 0.19
                  extra_passes: 3
                slice:
                  core_update_mode: sigma_then_gamma
                  width_gamma: 0.58
                  width_sigma: 0.21
                  core_extra_passes: 2
                  max_steps_out: 86
                  max_shrink: 320
                  max_steps_out_sigma: 165
                  max_shrink_sigma: 440

  - profile_id: J660_rhs_tt1000_chain1600_focus
    label: RHS tt1000 Chain1600 Focus
    rationale: >
      Deeper long-horizon rhs persistence hedge that keeps the F640 geometry but
      pushes keep length further because the remaining long-horizon rhs debt is
      dominated by low ESS and autocorrelation.
    overrides:
      pipeline:
        inference:
          mcmc:
            prior_overrides:
              rhs_ns:
                n_burn: 850
                n_mcmc: 1600
                progress_every: 100
                transformed_block:
                  enabled: true
                  center: posterior_median
                  widths:
                    beta: 0.28
                    log_sigma: 0.20
                    log_lambda: 0.20
                  extra_passes: 2
                slice:
                  core_update_mode: sigma_then_gamma
                  width_gamma: 0.60
                  width_sigma: 0.22
                  core_extra_passes: 2
                  max_steps_out: 92
                  max_shrink: 350
                  max_steps_out_sigma: 175
                  max_shrink_sigma: 460
