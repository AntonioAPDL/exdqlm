stages:
  - id: R1_gausmix_tt5000_residual
    label: Residual Gausmix Long-Horizon Pocket
    rationale: >
      Highest-value remaining pocket after the first closure wave. Includes both remaining root
      failures plus the surviving long-horizon gausmix exal and VB-tail fails.
    profile_ids:
      [
        L610_gmix_long_vbguard_local,
        L620_gmix_long_vbguard_softgamma,
        L630_gmix_long_deep_rescue,
        L640_gmix_long_split_diag
      ]
    selection_metric: target_fit_fail_n
    target_selector:
      family: [gausmix]
      fit_size: [5000]
      signoff_grade: [FAIL]

  - id: R2_gausmix_tt500_residual
    label: Residual Gausmix Short-Horizon Pocket
    rationale: >
      Focused short-horizon gausmix cleanup after K510. Remaining rows are mainly ridge VB-tail
      failures plus one rhs_ns MCMC exal drift row.
    profile_ids:
      [
        L650_gmix_short_vbguard_local,
        L660_gmix_short_vbguard_softgamma,
        L670_gmix_short_diag_mix
      ]
    selection_metric: target_fit_fail_n
    target_selector:
      family: [gausmix]
      fit_size: [500]
      signoff_grade: [FAIL]

  - id: R3_ridge_tt5000_singleton_residual
    label: Residual Ridge Long-Horizon Singleton
    rationale: >
      The long-horizon ridge residual is now a single normal tau=0.95 root, so we can afford a
      small but explicit overnight singleton cleanup substage.
    profile_ids:
      [
        L710_ridge_long_chain_guard,
        L720_ridge_long_softgamma_plus,
        L730_ridge_long_softgamma_deep
      ]
    selection_metric: target_fit_fail_n
    target_selector:
      family: [normal]
      tau: [0.95]
      fit_size: [5000]
      prior: [ridge]
      signoff_grade: [FAIL]

  - id: R4_rhs_tt5000_residual
    label: Residual RHS Long-Horizon Pocket
    rationale: >
      Remaining long-horizon rhs_ns fail surface after carrying forward the safer K550 local
      control. Includes both MCMC drift rows and rhs-specific VB tail-instability rows.
    profile_ids:
      [
        L740_rhs_long_vbguard_local,
        L750_rhs_long_vbguard_mid,
        L760_rhs_long_vbguard_deep
      ]
    selection_metric: target_fit_fail_n
    target_selector:
      family: [laplace, normal]
      fit_size: [5000]
      prior: [rhs_ns]
      signoff_grade: [FAIL]

  - id: R5_short_horizon_mixed_residual
    label: Residual Short-Horizon Mixed Pocket
    rationale: >
      Remaining short-horizon laplace/normal pocket after K580. Surviving rows are mostly MCMC
      exal tails, so this stage explores only nearby mixed MCMC rescues rather than reopening broad
      search.
    profile_ids:
      [
        L770_short_mixed_local_mcmc,
        L780_short_mixed_mid_mcmc,
        L790_short_mixed_softgamma_plus
      ]
    selection_metric: target_fit_fail_n
    target_selector:
      family: [laplace, normal]
      fit_size: [500]
      signoff_grade: [FAIL]
