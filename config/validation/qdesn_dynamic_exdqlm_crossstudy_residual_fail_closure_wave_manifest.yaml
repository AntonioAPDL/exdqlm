profiles:
  - profile_id: L610_gmix_long_vbguard_local
    label: Gmix Long VB Guard Local
    rationale: >
      First broad gausmix-long follow-up: add explicit VB guards on both priors and keep MCMC
      changes modest so we attack drift and tail-instability together without jumping too far from
      the surviving K510 neighborhood.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_strong
              rhs_ns: *rhs_vb_guard_strong
          mcmc:
            prior_overrides:
              ridge: *ridge_chain1300
              rhs_ns: *rhs_softfreeze95_chain1000

  - profile_id: L620_gmix_long_vbguard_softgamma
    label: Gmix Long VB Guard Softgamma
    rationale: >
      Mixed gausmix-long rescue that keeps the strong VB guard but shifts the ridge MCMC geometry
      into the softer K540 neighborhood while modestly lengthening the rhs schedule.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_strong
              rhs_ns: *rhs_vb_guard_strong
          mcmc:
            prior_overrides:
              ridge: *ridge_softgamma_chain1400
              rhs_ns: *rhs_softfreeze100_chain1100

  - profile_id: L630_gmix_long_deep_rescue
    label: Gmix Long Deep Rescue
    rationale: >
      Highest-intensity gausmix-long rescue kept for the worst root-failure and missing-diagnostic
      pocket: stronger VB guard plus deeper MCMC schedules on both priors.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_plus
              rhs_ns: *rhs_vb_guard_plus
          mcmc:
            prior_overrides:
              ridge: *ridge_softgamma_chain1500
              rhs_ns: *rhs_softfreeze110_chain1200

  - profile_id: L640_gmix_long_split_diag
    label: Gmix Long Split Diag
    rationale: >
      Alternative gausmix-long hedge that keeps ridge less soft than L620/L630 while still pushing
      the rhs_ns branch deeper, aimed at separating ridge VB-tail fixes from rhs MCMC failures.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_plus
              rhs_ns: *rhs_vb_guard_strong
          mcmc:
            prior_overrides:
              ridge: *ridge_chain1300
              rhs_ns: *rhs_softfreeze110_chain1200

  - profile_id: L650_gmix_short_vbguard_local
    label: Gmix Short VB Guard Local
    rationale: >
      Cheapest short-horizon gausmix follow-up: focus on ridge VB tail cleanup while giving the one
      remaining rhs_ns MCMC row a mild local freeze extension.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_strong
              rhs_ns: *rhs_vb_guard_strong
          mcmc:
            prior_overrides:
              rhs_ns: *rhs_softfreeze95_chain1000

  - profile_id: L660_gmix_short_vbguard_softgamma
    label: Gmix Short VB Guard Softgamma
    rationale: >
      Short-horizon gausmix hedge that combines stronger VB guards with a softer ridge MCMC
      geometry in case the remaining short ridge rows are coupled VB plus geometry problems.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_plus
              rhs_ns: *rhs_vb_guard_strong
          mcmc:
            prior_overrides:
              ridge: *ridge_softgamma_chain1400
              rhs_ns: *rhs_softfreeze95_chain1000

  - profile_id: L670_gmix_short_diag_mix
    label: Gmix Short Diag Mix
