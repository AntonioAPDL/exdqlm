meta:
  name: qdesn_dynamic_exdqlm_crossstudy_residual_fail_closure_wave_20260407
  display_name: QDESN Dynamic exdqlm Cross-Study Residual Fail Closure Wave
  purpose: >
    Continue from the completed targeted fit-fail closure wave using only clearly defensible local
    winners plus a conservative rhs long-horizon carry-forward control. Search the remaining
    dynamic fail surface broadly but only inside the surviving high-value tuning neighborhoods.
  branch: feature/qdesn-mcmc-alternative-0p4p0-integration
  safe_default: prepare_only
  run_tag_prefix: qdesn-dynamic-exdqlm-crossstudy-residualfail

source:
  mode: prior_fitfail_wave
  run_tag: qdesn-dynamic-exdqlm-crossstudy-fitfail-20260407-000615__git-54c5009
