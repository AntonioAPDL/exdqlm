campaign:
  name: qdesn_dynamic_exdqlm_crossstudy_tau050_failed_mcmc_thetafreeze_validation
  results_root: results/qdesn_mcmc_validation/dynamic_exdqlm_crossstudy_tau050_failed_mcmc_thetafreeze_validation
  reports_root: reports/qdesn_mcmc_validation/dynamic_exdqlm_crossstudy_tau050_failed_mcmc_thetafreeze_validation

grid:
  source_mode: materialized_source_inputs

execution:
  methods: [vb, mcmc]
  likelihood_families: [exal, al]
  seed_policy:
    mode: deterministic_per_root
    base_seed: 41000

study_contract:
  core_lane: false
  id: tau050_failed_mcmc_thetafreeze
  description: |
    Crash-only relaunch lane for the original 23 hard numerical MCMC failures
    from the April 16, 2026 tau050 refreshed-main source campaign. This lane
    keeps the stronger VB warm-start and tau-freeze policy, disables the direct
    latent-v and latent-s MCMC freeze schedules, and adds a new theta-freeze
    scheduler on the beta update so we can isolate a theta-plus-tau
    stabilization strategy under the newer GIG input floor.
  budget:
    posterior_metric_draws: 20000
    vb_sampling_nd_draws: 20000
    vb_synthesis_n_samp: 20000
    mcmc_n_burn: 5000
    mcmc_n_mcmc: 20000
    mcmc_thin: 1
  vb:
    method: LDVB
    profile_id: qdesn_ldvb_failed_mcmc_thetafreeze
    sigmagam:
      freeze_warmup_iters: 20
      force_after_warmup: true
      postwarmup_damping: 0.35
      postwarmup_damping_iters: 10
      min_postwarmup_updates: 3
  mcmc:
    kernel: slice
    require_slice: true
    require_init_from_vb: true
    banned_proposals: [rw, laplace_rw]
    sigmagam:
      freeze_burnin_iters: 0
      freeze_only_during_burn: true
      force_after_warmup: false
      delay_adapt_until_after_warmup: false
      delay_laplace_refresh_until_after_warmup: false
    theta:
      enabled: true
      freeze_burnin_iters: 50
      freeze_only_during_burn: true
      sparse_update_every: 10
      sparse_update_until_iter: 500
      force_first_postwarmup_update: true
      trace: true
    latent_v:
      enabled: false
      freeze_burnin_iters: 0
      freeze_only_during_burn: true
      sparse_update_every: 1
      sparse_update_until_iter: 0
      force_first_postwarmup_update: false
      rescue_on_invalid: false
      trace: true
    latent_s:
      enabled: false
      freeze_burnin_iters: 0
      freeze_only_during_burn: true
      sparse_update_every: 1
      sparse_update_until_iter: 0
      force_first_postwarmup_update: false
      trace: true
    vb_warm_start:
      method: LDVB
      max_iter: 500
      min_iter_elbo: 80
      n_samp_xi: 1000
      sigmagam:
        freeze_warmup_iters: 20
        force_after_warmup: true
        postwarmup_damping: 0.35
        postwarmup_damping_iters: 10
        min_postwarmup_updates: 3

rescue_overlays:
