meta:
  study_id: qdesn_dynamic_candidate_dataset_bundle
  scenario_id: dlm_constV_p90_m0amp_highnoise_steepertrend_v1
  notes: >
    Promoted period-90 dynamic source surface with a steeper baseline trend
    selected as the main dynamic dataset candidate for the next relaunch.
    The latent path is shared within family across tau, tau-specific
    observation series are produced by deterministic quantile centering
    shifts, and the initial state is set deterministically to m0 so the
    intended slope is not overwhelmed by C0-scale randomness.

generation:
