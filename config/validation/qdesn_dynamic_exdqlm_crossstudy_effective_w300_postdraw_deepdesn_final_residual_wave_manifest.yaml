profiles:
  - profile_id: E410_rhs_long_gausmix_guard320_balanced3200
    label: RHS Long Gausmix Guard320 Balanced3200
    rationale: >
      First safe replacement for the rejected D410 profile. Strengthen the rhs VB guard and move to
      a balanced long-horizon chain without the narrow-first geometry that caused root errors.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              rhs_ns: *rhs_vb_guard_320
          mcmc:
            prior_overrides:
              rhs_ns: *rhs_long_balanced_3200

  - profile_id: E420_rhs_long_gausmix_guard320_diag3400
    label: RHS Long Gausmix Guard320 Diag3400
    rationale: >
      Gausmix-specific diagnostics profile. Keep the same guard strength as E410 but use a narrower
      diagnostic chain to attack the remaining long-horizon drift and missing-diagnostics pocket.
    overrides:
      pipeline:
        inference:
