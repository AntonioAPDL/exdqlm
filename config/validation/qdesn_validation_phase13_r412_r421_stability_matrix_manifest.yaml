profiles:
  - id: R500_r412_provisional_anchor
    batch: B0_controls
    family: r412_provisional_anchor
    description: Phase-12 practical lead retained as the new provisional search anchor.
    patch: *r500_patch

  - id: R501_r400_previous_anchor
    batch: B0_controls
    family: r400_previous_anchor
    description: Previous R312-based anchor retained as a direct comparison control.
    patch: *r501_patch

  - id: R502_r402_balanced_control
    batch: B0_controls
    family: r402_balanced_control
    description: Clean balanced control retained for sentinel discipline.
    patch: *r502_patch

  - id: R503_r421_upside_reference
    batch: B0_controls
    family: r421_upside_reference
    description: High-upside rhs-local reference retained from the best Phase-12 local result.
    patch: *r503_patch

  - id: R510_r412_chain1000
    batch: B1_r412_stability
    family: r412_chain1000
    description: Slightly longer-chain variant of the R412 lead.
    patch: *r510_patch

  - id: R511_r412_pass2
    batch: B1_r412_stability
    family: r412_pass2
    description: One extra ridge core pass around the R412 lead.
    patch: *r511_patch

  - id: R512_r412_pass2_chain1000
    batch: B1_r412_stability
    family: r412_pass2_chain1000
    description: Extra ridge pass plus a small keep-size increase around the R412 lead.
    patch: *r512_patch

  - id: R513_r412_burn550_chain1000
    batch: B1_r412_stability
    family: r412_burn550_chain1000
    description: Slightly deeper burn-in plus a small keep-size increase around the R412 lead.
    patch: *r513_patch

  - id: R520_r421_chain1000_trim
    batch: B2_r421_trimmed
    family: r421_chain1000_trim
    description: Trimmed version of the high-upside R421 rhs-local signal.
    patch: *r520_patch

  - id: R521_r421_chain1050_trim
    batch: B2_r421_trimmed
    family: r421_chain1050_trim
    description: Intermediate trimmed version of the high-upside R421 rhs-local signal.
    patch: *r521_patch

  - id: R530_r412_ridge_r421_rhs_chain1000
    batch: B3_combined
    family: r412_ridge_r421_rhs_chain1000
    description: R412 ridge recipe combined with trimmed R421 rhs support.
    patch: *r530_patch

  - id: R531_r412_ridge_r421_rhs_chain1050
    batch: B3_combined
    family: r412_ridge_r421_rhs_chain1050
    description: R412 ridge recipe plus slightly larger trimmed R421 rhs support.
    patch: *r531_patch

  - id: R532_r412_pass2_r421_rhs_chain1000
    batch: B3_combined
    family: r412_pass2_r421_rhs_chain1000
    description: R412 extra-pass ridge recipe paired with trimmed R421 rhs support.
    patch: *r532_patch

  - id: R540_r402_softsigma_steps70
    batch: B4_r402_hedge
    family: r402_softsigma_steps70
    description: Clean R402 hedge with the R412 ridge recipe applied.
    patch: *r540_patch

  - id: R541_r402_softsigma_steps70_rhsfreeze90
    batch: B4_r402_hedge
    family: r402_softsigma_steps70_rhsfreeze90
    description: Clean R402 hedge with the R412 ridge recipe plus mild rhs support.
    patch: *r541_patch

stages:
  - id: S1_exact_fullsix_refinement
    description: Broad exact full-6 refinement matrix around the R412 lead and R421 rhs reference.
    profile_source: all_candidates
    selector:
      mode: explicit_roots
      roots:
        - scenario: dlm_ar1V
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_bigW
          tau: 0.05
          likelihood_family: exal
          beta_prior_type: ridge
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_bigW
          tau: 0.95
          likelihood_family: al
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.50
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: ridge
          seed: 123
          reservoir_profile: tiny_d1_n8
    advance:
      type: rank_filter_top_n
      top_n: 6
      max_total_fail_n: 4
      max_sentinel_fail_n: 1
      max_runtime_inflation: 1.35
      min_fail_reduction: 0.333
      min_severe_improved_n: 1
      reference_profile_id: R500_r412_provisional_anchor
      require_not_worse_than_reference: true

  - id: S2_rerun_confirmation
    description: Exact rerun confirmation of the strongest Stage-1 survivors against the same full-6 harness.
    profile_source: selected_from_previous
    selector:
      mode: all
    advance:
      type: rank_filter_top_n
      top_n: 4
      max_total_fail_n: 3
      max_sentinel_fail_n: 1
      max_runtime_inflation: 1.30
      min_fail_reduction: 0.500
      min_severe_improved_n: 1
      reference_profile_id: R500_r412_provisional_anchor
      require_better_than_reference: true

  - id: S3_final_sentinel_confirmation
    description: Final exact rerun of the confirmation survivors with a zero-sentinel requirement.
    profile_source: selected_from_previous
    selector:
      mode: all
    advance:
      type: rank_filter_top_n
      top_n: 2
      max_total_fail_n: 3
      max_sentinel_fail_n: 0
      max_runtime_inflation: 1.30
      min_fail_reduction: 0.500
      min_severe_improved_n: 1
      reference_profile_id: R500_r412_provisional_anchor
      require_better_than_reference: true
