campaign:
  name: qdesn_static_exdqlm_crossstudy_residual_mcmc_closure_wave
  results_root: results/qdesn_mcmc_validation/static_exdqlm_crossstudy_residual_mcmc_closure_wave
  reports_root: reports/qdesn_mcmc_validation/static_exdqlm_crossstudy_residual_mcmc_closure_wave

source:
  run_tag: qdesn-static-exdqlm-crossstudy-fitfail-20260404b__git-2aa809c
  prior_wave_report_root: reports/qdesn_mcmc_validation/static_exdqlm_crossstudy_fit_fail_closure_wave
  interpretation: wave3_promoted_local_baseline_map_plus_unvalidated_wave1_root_fails

runtime:
  default_workers: 8
  active_job_workers: 6
  hard_cap_workers: 8

stages:
  - id: S1_ridge_tt100_residual_drift
    description: >
      Residual ridge exal/mcmc closure on the short-horizon slice. Wave 3
      already showed that the F510 ridge geometry is the right local baseline
      and that chain-only inflation does not help. This stage therefore keeps
      F510 as control and tests tighter drift-focused geometry with only modest
      extra keep length.
    control_profile_id: G510_ridge_local_baseline
    stage_selector:
      prior: ridge
      method: mcmc
      model: exal
      signoff_grade: FAIL
      fit_size: 100
    target_selector:
      prior: ridge
      method: mcmc
      model: exal
      signoff_grade: FAIL
      fit_size: 100
    selection_metric: target_fit_fail_n
    profile_ids:
      - G510_ridge_local_baseline
      - G520_ridge_tt100_drift_guard
      - G530_ridge_tt100_drift_guard_chain1300

  - id: S2_ridge_tt1000_residual_ess_plus_hardroots
    description: >
      Residual ridge exal/mcmc closure on the longer-horizon slice. The
      promoted F510 baseline still leaves mostly gausmix/normal tt=1000 ESS and
      autocorrelation debt, while the original static_shrink x laplace x tt1000
      ridge hard-root FAIL band was never revalidated in Wave 3. This stage
      therefore combines the promoted residual roots with the unresolved source
      hard-root FAIL triad.
    control_profile_id: G510_ridge_local_baseline
    stage_selector:
      prior: ridge
      method: mcmc
      model: exal
      signoff_grade: FAIL
      fit_size: 1000
    include_source_root_status_fail_selector:
      prior: ridge
      root_kind: static_shrink
      family: laplace
      fit_size: 1000
    target_selector:
      prior: ridge
      method: mcmc
      model: exal
      signoff_grade: FAIL
      fit_size: 1000
    selection_metric: target_fit_fail_n
    profile_ids:
      - G510_ridge_local_baseline
      - G540_ridge_tt1000_hybrid_chain1400
      - G550_ridge_tt1000_hybrid_chain1600

  - id: S3_rhs_tt100_residual_mcmc
    description: >
      Residual rhs_ns MCMC closure on the short-horizon slice. Wave 3 showed
      that conservative transformed-block geometry beats chain-only inflation,
      so this stage keeps F610 as control and tests two geometry-first drift
      guards with only modest extra keep length.
    control_profile_id: G610_rhs_tt100_local_baseline
    stage_selector:
      prior: rhs_ns
      method: mcmc
      signoff_grade: FAIL
      fit_size: 100
    target_selector:
      prior: rhs_ns
      method: mcmc
      signoff_grade: FAIL
      fit_size: 100
    selection_metric: target_fit_fail_n
    profile_ids:
      - G610_rhs_tt100_local_baseline
      - G620_rhs_tt100_hybrid_chain1250
      - G630_rhs_tt100_drift_guard_plus

  - id: S4_rhs_tt1000_residual_mcmc_plus_hardroots
    description: >
      Residual rhs_ns MCMC closure on the longer-horizon slice. Wave 3 showed
      that chain extension helps more than geometry-only tightening here, but
      the original static_shrink x laplace x tt1000 rhs_ns hard-root FAIL band
      was not revalidated inside the promoted map. This stage carries both the
      promoted residual roots and that unresolved hard-root triad.
    control_profile_id: G640_rhs_tt1000_local_baseline
    stage_selector:
      prior: rhs_ns
      method: mcmc
      signoff_grade: FAIL
      fit_size: 1000
    include_source_root_status_fail_selector:
      prior: rhs_ns
      root_kind: static_shrink
      family: laplace
      fit_size: 1000
    target_selector:
      prior: rhs_ns
      method: mcmc
      signoff_grade: FAIL
      fit_size: 1000
    selection_metric: target_fit_fail_n
    profile_ids:
      - G640_rhs_tt1000_local_baseline
      - G650_rhs_tt1000_hybrid_block_chain1400
      - G660_rhs_tt1000_chain1600_focus

profiles:
  - profile_id: G510_ridge_local_baseline
    label: Ridge Local Baseline
    rationale: >
      The promoted Wave-3 ridge-local winner. This remains the control for both
      ridge residual stages unless a narrower challenger clearly improves it.
    overrides:
      pipeline:
        inference:
          mcmc:
            prior_overrides:
              ridge:
                n_burn: 550
                n_mcmc: 1100
                progress_every: 100
                slice:
                  core_update_mode: sigma_then_gamma
                  width_gamma: 0.53
                  width_sigma: 0.20
                  core_extra_passes: 2
                  max_steps_out: 70
                  max_shrink: 280
                  max_steps_out_sigma: 150
                  max_shrink_sigma: 400

  - profile_id: G520_ridge_tt100_drift_guard
    label: Ridge tt100 Drift Guard
    rationale: >
      Tighter F510-derived ridge geometry with a small burn extension. Included
      because the remaining ridge tt=100 roots are drift-heavy and did not
      respond to broader chain-only inflation.
    overrides:
      pipeline:
        inference:
          mcmc:
            prior_overrides:
              ridge:
                n_burn: 650
                n_mcmc: 1150
                progress_every: 100
                slice:
                  core_update_mode: sigma_then_gamma
                  width_gamma: 0.49
                  width_sigma: 0.18
                  core_extra_passes: 3
                  max_steps_out: 60
                  max_shrink: 240
                  max_steps_out_sigma: 130
                  max_shrink_sigma: 360

