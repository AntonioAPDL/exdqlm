meta:
  name: qdesn_validation_phase7_r44_refinement_20260401
  display_name: QDESN Phase 7 R44 Refinement + Stability Screen
  purpose: >
    Two-stage full-6 refinement program rooted at R44. Stage 1 searches the remaining useful rhs and
    ridge tuning space; Stage 2 reruns the strongest survivors to measure stability before carrying any
    new candidate forward.
  branch: feature/qdesn-mcmc-alternative
  safe_default: prepare_only

inputs:
  phase01_manifest: reports/qdesn_mcmc_validation/finalization_closeout-rhsfixrelaunch-20260329b__git-6ac4727/summary/phase01_manifest.json
  base_defaults: config/validation/qdesn_dynamic_family_prior_repair_defaults.yaml

outputs:
  report_root: reports/qdesn_mcmc_validation/qdesn_validation_phase7_r44_refinement
  results_root: results/qdesn_mcmc_validation/qdesn_validation_phase7_r44_refinement

controls:
  anchor_profile_id: R61_r44_anchor
  resume_completed_stages: true
  create_plots: false
  profile_verbose: true
  campaign_workers: 4
  threads_per_worker: 1
  profile_timeout_minutes: 180
  timeout_kill_after_seconds: 30
  continue_on_profile_error: true
  max_timeout_profiles: 4
  max_error_profiles: 4
  stop_on_anchor_operational_failure: true

batches:
  - id: B0_controls
    description: Control profiles from the prior waves.
  - id: B1_rhs_refine
    description: Mild rhs stabilization descendants on top of R44.
  - id: B2_ridge_refine
    description: Ridge refinement descendants on top of R44.
  - id: B3_combined
    description: Combined descendants that merge the best new rhs and ridge ideas.

profiles:
  - id: R60_r31_control
    batch: B0_controls
    family: r31_control
    description: Exact Phase 6 R31 carry-forward control profile.
    patch:
      pipeline:
        inference:
          mcmc:
            transforms:
              use_log_sigma: true
              sigma_eta_bounds: [-10, 10]
            prior_overrides:
              ridge:
                n_burn: 300
                n_mcmc: 600
                progress_every: 50
                slice:
                  core_update_mode: sigma_then_gamma
                  width_gamma: 0.55
                  width_sigma: 0.22
                  core_extra_passes: 0
                  max_steps_out: 50
                  max_shrink: 210
                  max_steps_out_sigma: 110
                  max_shrink_sigma: 340
              rhs_ns:
                n_burn: 500
                n_mcmc: 1000
                progress_every: 100
                rhs:
                  freeze_tau_burnin_iters: 80
                  freeze_tau_only_during_burn: true
                  width_adapt:
                    enabled: true
                    warmup_iters: 350
                    only_during_burn: true
                    target_score_low: -0.75
                    target_score_high: 0.75
                    step_size: 0.015
                    width_min: 0.02
                    width_max: 1.8
                slice:
                  core_update_mode: sigma_then_gamma
                  width_gamma: 0.42
                  width_sigma: 0.32
                  width_rhs_lambda: 0.18
                  width_rhs_tau: 0.12
                  width_rhs_c2: 0.08
                  width_rhs_tau_c2_block: 0.26
                  rhs_global_block_update: transformed_tau_c2_block
                  rhs_transformed_block_passes: 4
                  width_rhs_tau_c2_transformed_z1: 0.22
                  width_rhs_tau_c2_transformed_z2: 0.18
                  core_extra_passes: 2
                  max_steps_out: 70
                  max_shrink: 260
                  max_steps_out_sigma: 130
                  max_shrink_sigma: 360

