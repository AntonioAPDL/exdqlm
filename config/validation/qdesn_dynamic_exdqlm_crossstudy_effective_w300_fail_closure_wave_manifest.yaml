stages:
  - id: W1_ridge_lower_tail_short
    label: Ridge VB Lower-Tail Short-Horizon Band
    rationale: >
      Three short-horizon ridge roots with only ridge VB fail rows. This is the cleanest place to
      test whether stronger ridge VB guards alone close the lower-tail short-horizon gap.
    profile_ids: [N710_ridge_vb_guard160, N720_ridge_vb_guard192, N730_ridge_vb_guard224, N740_ridge_vb_guard256]
    selection_metric: target_fit_fail_n
    target_selector:
      prior: [ridge]
      inference: [vb]
      tau: [0.05]
      fit_size: [500]
      signoff_grade: [FAIL]

  - id: W2_ridge_lower_tail_long
    label: Ridge VB Lower-Tail Long-Horizon Band
    rationale: >
      Three long-horizon ridge lower-tail roots with the same ridge-VB-only failure mode under the
      stronger effective-w300 contract.
    profile_ids: [N710_ridge_vb_guard160, N720_ridge_vb_guard192, N730_ridge_vb_guard224, N740_ridge_vb_guard256]
    selection_metric: target_fit_fail_n
    target_selector:
      prior: [ridge]
      inference: [vb]
      tau: [0.05]
      fit_size: [5000]
      signoff_grade: [FAIL]

  - id: W3_ridge_upper_tail_short
    label: Ridge Upper-Tail Short-Horizon Band
    rationale: >
      Three short-horizon ridge upper-tail roots. These retain the dominant ridge VB fail pattern
      plus one ridge mcmc_exal drift row, so combo profiles are included here.
    profile_ids: [N720_ridge_vb_guard192, N730_ridge_vb_guard224, N750_ridge_tail_combo2200, N760_ridge_tail_combo2400]
    selection_metric: target_fit_fail_n
    target_selector:
      prior: [ridge]
      tau: [0.95]
      fit_size: [500]
      signoff_grade: [FAIL]

  - id: W4_ridge_upper_tail_long
    label: Ridge Upper-Tail Long-Horizon Band
    rationale: >
      Three long-horizon ridge upper-tail roots. This is the highest-value ridge stage because it
      combines the pervasive ridge VB fail mode with one of the two surviving ridge mcmc_exal
      drift rows.
    profile_ids: [N720_ridge_vb_guard192, N730_ridge_vb_guard224, N750_ridge_tail_combo2200, N760_ridge_tail_combo2400]
    selection_metric: target_fit_fail_n
    target_selector:
      prior: [ridge]
      tau: [0.95]
      fit_size: [5000]
      signoff_grade: [FAIL]

  - id: W5_rhs_short_exal_drift
    label: RHS Short-Horizon exAL Drift Band
    rationale: >
      Three short-horizon rhs_ns roots with only mcmc_exal drift failures. Healthy VB branches are
      left untouched so this stage spends compute only on short rhs MCMC geometry and depth.
    profile_ids: [N810_rhs_short_drift2200, N820_rhs_short_freeze145_2400, N830_rhs_short_narrow2400, N840_rhs_short_burnheavy2600]
    selection_metric: target_fit_fail_n
    target_selector:
      prior: [rhs_ns]
      model: [exal]
      fit_size: [500]
      signoff_grade: [FAIL]

  - id: W6_rhs_long_exal_residual
    label: RHS Long-Horizon exAL Residual Band
    rationale: >
      Five long-horizon rhs_ns roots carrying the remaining mixed exal fail band: three vb_exal
      tail-instability rows and three mcmc_exal drift rows on overlapping roots.
    profile_ids: [N910_rhs_long_guard160_drift2200, N920_rhs_long_guard192_narrow2400, N930_rhs_long_guard224_burnheavy2600, N940_rhs_long_guard224_diag2600]
    selection_metric: target_fit_fail_n
    target_selector:
      prior: [rhs_ns]
      model: [exal]
      fit_size: [5000]
      signoff_grade: [FAIL]
