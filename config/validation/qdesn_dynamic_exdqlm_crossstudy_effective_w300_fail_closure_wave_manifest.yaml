profiles:
  - profile_id: N710_ridge_vb_guard160
    label: Ridge VB Guard160
    rationale: >
      Cheapest ridge-only VB stabilization step: double the VB Monte Carlo budget and lengthen the
      ELBO window without changing MCMC.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_160

  - profile_id: N720_ridge_vb_guard192
    label: Ridge VB Guard192
    rationale: >
      Mid-intensity ridge-only VB stabilization candidate retained because the repaired fail
      surface is dominated by ridge VB tail instability rather than MCMC execution debt.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_192

  - profile_id: N730_ridge_vb_guard224
    label: Ridge VB Guard224
    rationale: >
      Strong ridge-only VB guard for tails where both al and exal fail together, suggesting the
      main weakness is posterior-tail stabilization rather than likelihood-specific behavior.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_224

  - profile_id: N740_ridge_vb_guard256
    label: Ridge VB Guard256
    rationale: >
      Highest-value ridge-only hedge kept for long-horizon tail rows in case the remaining fail
      band is simply under-iterated under the stronger effective-w300 contract.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_256

  - profile_id: N750_ridge_tail_combo2200
    label: Ridge Tail Combo2200
    rationale: >
      Upper-tail ridge combo candidate: strengthen ridge VB and modestly deepen/soften ridge MCMC
      to address the coupled laplace tau=0.95 mcmc_exal drift pocket without retuning healthy
      methods.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_192
          mcmc:
            prior_overrides:
              ridge: *ridge_softgamma_2200

  - profile_id: N760_ridge_tail_combo2400
    label: Ridge Tail Combo2400
    rationale: >
      Strongest ridge upper-tail combo candidate: stronger VB plus a deeper softer ridge chain for
      the two surviving ridge mcmc_exal drift rows.
    overrides:
      pipeline:
        inference:
          vb:
            prior_overrides:
              ridge: *ridge_vb_guard_224
          mcmc:
            prior_overrides:
              ridge: *ridge_softgamma_2400

  - profile_id: N810_rhs_short_drift2200
    label: RHS Short Drift2200
    rationale: >
      Cheapest short-horizon rhs_ns exal drift rescue: lengthen burn and keep draws while narrowing
      the rhs block modestly.
    overrides:
      pipeline:
        inference:
          mcmc:
            prior_overrides:
              rhs_ns: *rhs_short_drift_2200

  - profile_id: N820_rhs_short_freeze145_2400
    label: RHS Short Freeze145 2400
    rationale: >
      Freeze-focused short-horizon rhs_ns hedge retained because the surviving short drift rows are
      small and may respond more to warmup stabilization than to aggressive geometry changes alone.
    overrides:
      pipeline:
        inference:
          mcmc:
            prior_overrides:
              rhs_ns: *rhs_short_freeze145_2400

  - profile_id: N830_rhs_short_narrow2400
    label: RHS Short Narrow2400
    rationale: >
      Narrower short-horizon rhs_ns transformed-block profile aimed at Geweke and half-chain drift
      without forcing unnecessary VB changes.
    overrides:
      pipeline:
        inference:
          mcmc:
            prior_overrides:
              rhs_ns: *rhs_short_narrow_2400

  - profile_id: N840_rhs_short_burnheavy2600
    label: RHS Short Burnheavy2600
    rationale: >
      Burn-heavy short-horizon rhs_ns hedge kept for overnight learning value in case the drift
