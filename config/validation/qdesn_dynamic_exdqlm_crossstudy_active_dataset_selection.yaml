study_contract:
  full_root_count: 9
  canonical_window_count: 18
  qdesn_window_count: 18
  families: [gausmix, laplace, normal]
  taus: [0.05, 0.25, 0.50]
  canonical_fit_sizes: [500, 5000]
  qdesn_effective_fit_sizes: [500, 5000]
  qdesn_total_sizes: [813, 5313]
  qdesn_holdout_n: 1
  qdesn_lag_max: 12
  qdesn_washout: 300

relaunch_mapping:
  single_prior_fit_count: 72
  dual_prior_fit_count: 144
  note: >
    The 72-case relaunch corresponds to the 18 effective source windows crossed
    with {vb, mcmc} and {al, exal} on one prior surface. Including both ridge
    and rhs_ns expands the same source contract to 144 total fits.

recommended_baseline:
  shared_package_default_warmup: true
  recommended_first_prior_surface: ridge
  recommended_second_prior_surface: rhs_ns
  rhs_tau_warmup_iters: 50
  rhs_ns_tau_warmup_iters: 50
  exal_vb_sigmagam_default: true
  exal_mcmc_sigmagam_default: true
  mcmc_init_from_vb: true
  keep_rescue_overlays_off_in_baseline: true
