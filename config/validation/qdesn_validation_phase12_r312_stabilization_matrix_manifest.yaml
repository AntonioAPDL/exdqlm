meta:
  name: qdesn_validation_phase12_r312_stabilization_matrix_20260403
  display_name: QDESN Phase 12 R312 Stabilization Matrix
  purpose: >
    Three-stage exact full-6 stabilization wave rooted in the Phase-11 provisional scientific lead
    R312. Stage 1 runs a broad but disciplined exact matrix around R312, Stage 2 reruns the best
    exact survivors against the same full-6 harness, and Stage 3 requires zero sentinel FAIL before
    any promotion decision.
  branch: feature/qdesn-mcmc-alternative
  safe_default: prepare_only

inputs:
  phase01_manifest: reports/qdesn_mcmc_validation/finalization_closeout-rhsfixrelaunch-20260329b__git-6ac4727/summary/phase01_manifest.json
  base_defaults: config/validation/qdesn_dynamic_family_prior_repair_defaults.yaml

outputs:
  report_root: reports/qdesn_mcmc_validation/qdesn_validation_phase12_r312_stabilization_matrix
  results_root: results/qdesn_mcmc_validation/qdesn_validation_phase12_r312_stabilization_matrix

controls:
  anchor_profile_id: R400_r312_provisional_anchor
  resume_completed_stages: true
  create_plots: false
  profile_verbose: true
  campaign_workers: 6
  threads_per_worker: 1
  profile_timeout_minutes: 240
  timeout_kill_after_seconds: 30
  continue_on_profile_error: true
  max_timeout_profiles: 4
  max_error_profiles: 4
  stop_on_anchor_operational_failure: true

batches:
  - id: B0_controls
    description: Exact full-6 scientific, balanced, and runtime controls.
  - id: B1_r312_ridge_local
    description: Mild ridge-local descendants around the provisional R312 lead.
  - id: B2_r312_rhs_local
    description: Mild rhs-local descendants around the provisional R312 lead.
  - id: B3_r312_combined
    description: Narrow combined descendants that pair one ridge and one rhs stabilization idea.
  - id: B4_r301_hedge
    description: One clean balanced hedge around the sentinel-friendly R301 control.

shared_patches:
  logsigma: &logsigma
    use_log_sigma: true
    sigma_eta_bounds: [-10, 10]

  width_adapt_350: &width_adapt_350
    enabled: true
    warmup_iters: 350
    only_during_burn: true
    target_score_low: -0.75
    target_score_high: 0.75
    step_size: 0.015
    width_min: 0.02
    width_max: 1.8

  width_adapt_360: &width_adapt_360
    enabled: true
    warmup_iters: 360
    only_during_burn: true
    target_score_low: -0.75
    target_score_high: 0.75
    step_size: 0.015
    width_min: 0.02
    width_max: 1.8

