profiles:
  - id: R400_r312_provisional_anchor
    batch: B0_controls
    family: r312_provisional_anchor
    description: Phase-11 provisional scientific lead from exact rerun confirmation.
    patch: *r312_patch

  - id: R401_r68_exact_anchor
    batch: B0_controls
    family: r68_exact_anchor
    description: Legacy exact R68 reference retained for direct comparison.
    patch: *r68_patch

  - id: R402_r65_balanced_control
    batch: B0_controls
    family: r65_balanced_control
    description: Balanced clean control retained for sentinel discipline.
    patch: *r65_patch

  - id: R403_r61_runtime_reference
    batch: B0_controls
    family: r61_runtime_reference
    description: Runtime reference control retained for cost discipline.
    patch: *r61_patch

  - id: R410_r312_steps70
    batch: B1_r312_ridge_local
    family: r312_steps70
    description: Modest ridge step-out expansion around the R312 lead.
    patch: *r312_steps70_patch

  - id: R411_r312_softsigma
    batch: B1_r312_ridge_local
