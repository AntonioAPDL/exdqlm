  - id: R440_r301_pass1_chain1100
    batch: B4_r301_hedge
    family: r301_pass1_chain1100
    description: Narrow balanced hedge around the sentinel-clean R301 control.
    patch: *r301_pass1_chain1100_patch

stages:
  - id: S1_exact_fullsix_stabilization
    description: Broad exact full-6 stabilization matrix around the provisional R312 lead.
    profile_source: all_candidates
    selector:
      mode: explicit_roots
      roots:
        - scenario: dlm_ar1V
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_bigW
          tau: 0.05
          likelihood_family: exal
          beta_prior_type: ridge
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_bigW
          tau: 0.95
          likelihood_family: al
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.50
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: ridge
          seed: 123
          reservoir_profile: tiny_d1_n8
    advance:
      type: rank_filter_top_n
      top_n: 6
      max_total_fail_n: 4
      max_sentinel_fail_n: 1
      max_runtime_inflation: 1.25
      min_fail_reduction: 0.333
      min_severe_improved_n: 1
      reference_profile_id: R400_r312_provisional_anchor
      require_not_worse_than_reference: true

  - id: S2_rerun_confirmation
    description: Exact rerun confirmation of the strongest Stage-1 survivors against the same full-6 harness.
    profile_source: selected_from_previous
    selector:
      mode: all
    advance:
      type: rank_filter_top_n
      top_n: 4
      max_total_fail_n: 3
      max_sentinel_fail_n: 1
      max_runtime_inflation: 1.25
      min_fail_reduction: 0.500
      min_severe_improved_n: 1
      reference_profile_id: R400_r312_provisional_anchor
      require_better_than_reference: true

  - id: S3_sentinel_confirmation
    description: Final exact rerun of the confirmation survivors with a zero-sentinel requirement.
    profile_source: selected_from_previous
    selector:
      mode: all
    advance:
      type: rank_filter_top_n
      top_n: 2
      max_total_fail_n: 3
      max_sentinel_fail_n: 0
      max_runtime_inflation: 1.25
      min_fail_reduction: 0.500
      min_severe_improved_n: 1
      reference_profile_id: R400_r312_provisional_anchor
      require_better_than_reference: true
