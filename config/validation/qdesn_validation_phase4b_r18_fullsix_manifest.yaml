meta:
  name: qdesn_validation_phase4b_r18_fullsix_20260331
  display_name: QDESN Phase 4B R18 Full-6 Confirmation
  purpose: >
    Cheap confirmation run that carries the best Phase 4 split-prior candidate into the fixed 6-root
    harness against the current best anchor. Targets FAIL reduction with WARN acceptable.
  branch: feature/qdesn-mcmc-alternative
  safe_default: prepare_only

inputs:
  phase01_manifest: reports/qdesn_mcmc_validation/finalization_closeout-rhsfixrelaunch-20260329b__git-6ac4727/summary/phase01_manifest.json
  base_defaults: config/validation/qdesn_dynamic_family_prior_repair_defaults.yaml

outputs:
  report_root: reports/qdesn_mcmc_validation/qdesn_validation_phase4b_r18_fullsix
  results_root: results/qdesn_mcmc_validation/qdesn_validation_phase4b_r18_fullsix

controls:
  anchor_profile_id: R0_current_best_anchor
  resume_completed_stages: true
  create_plots: false
  profile_verbose: true
  campaign_workers: 4
  threads_per_worker: 1
  profile_timeout_minutes: 120
  timeout_kill_after_seconds: 30
  continue_on_profile_error: true
  max_timeout_profiles: 2
  max_error_profiles: 2
  stop_on_anchor_operational_failure: true

batches:
  - id: B0_anchor
    description: Current-best transformed-sigma gamma-focus anchor.
  - id: B1_phase4_carry_forward
    description: Carry-forward confirmation of the best Phase 4 split-prior profile.

profiles:
  - id: R0_current_best_anchor
    batch: B0_anchor
    family: current_best_anchor
    description: >
      Exact current-best transformed-sigma gamma-focus anchor used as the live comparison baseline.
    patch:
      pipeline:
        inference:
          mcmc:
            transforms:
              use_log_sigma: true
              sigma_eta_bounds: [-10, 10]
            slice:
              core_update_mode: sigma_then_gamma
              width_gamma: 0.45
              width_sigma: 0.30
              core_extra_passes: 1
              max_steps_out: 55
              max_shrink: 220
              max_steps_out_sigma: 90
              max_shrink_sigma: 300
            prior_overrides:
              ridge:
                n_burn: 300
                n_mcmc: 600
                progress_every: 50
                slice:
                  width_gamma: 0.45
                  width_sigma: 0.30
                  core_extra_passes: 1
                  max_steps_out: 55
                  max_shrink: 220
                  max_steps_out_sigma: 90
                  max_shrink_sigma: 300
              rhs_ns:
                n_burn: 500
                n_mcmc: 1000
                progress_every: 100
                rhs:
                  freeze_tau_burnin_iters: 40
                  freeze_tau_only_during_burn: true
                  width_adapt:
                    enabled: true
                    warmup_iters: 250
                    only_during_burn: true
                    target_score_low: -1.0
                    target_score_high: 1.0
                    step_size: 0.02
                    width_min: 0.02
                    width_max: 2.0
                slice:
                  width_gamma: 0.45
                  width_sigma: 0.35
                  width_rhs_lambda: 0.20
                  width_rhs_tau: 0.14
                  width_rhs_c2: 0.09
                  width_rhs_tau_c2_block: 0.30
                  rhs_global_block_update: transformed_tau_c2_block
                  rhs_transformed_block_passes: 3
                  width_rhs_tau_c2_transformed_z1: 0.26
                  width_rhs_tau_c2_transformed_z2: 0.20
                  core_extra_passes: 1
                  max_steps_out: 65
                  max_shrink: 240
                  max_steps_out_sigma: 110
                  max_shrink_sigma: 320

  - id: R18_split_prior_rhsns_overlay
    batch: B1_phase4_carry_forward
    family: split_prior_rhsns_overlay
    description: >
      Best Phase 4 split-prior profile. Retains sigma-focus on ridge and the stronger rhs_ns warmup and
      global-local stabilization overlay that repaired the ar1V exal rhs_ns root.
    patch:
      pipeline:
        inference:
          mcmc:
            transforms:
              use_log_sigma: true
              sigma_eta_bounds: [-10, 10]
            prior_overrides:
              ridge:
                n_burn: 300
                n_mcmc: 600
                progress_every: 50
                slice:
                  core_update_mode: sigma_then_gamma
                  width_gamma: 0.55
                  width_sigma: 0.22
                  core_extra_passes: 0
                  max_steps_out: 50
                  max_shrink: 210
                  max_steps_out_sigma: 110
                  max_shrink_sigma: 340
              rhs_ns:
                n_burn: 500
                n_mcmc: 1000
                progress_every: 100
                rhs:
                  freeze_tau_burnin_iters: 80
                  freeze_tau_only_during_burn: true
                  width_adapt:
                    enabled: true
                    warmup_iters: 350
                    only_during_burn: true
                    target_score_low: -0.75
                    target_score_high: 0.75
                    step_size: 0.015
                    width_min: 0.02
                    width_max: 1.8
                slice:
                  core_update_mode: sigma_then_gamma
                  width_gamma: 0.42
                  width_sigma: 0.32
                  width_rhs_lambda: 0.18
                  width_rhs_tau: 0.12
                  width_rhs_c2: 0.08
                  width_rhs_tau_c2_block: 0.26
                  rhs_global_block_update: transformed_tau_c2_block
                  rhs_transformed_block_passes: 4
                  width_rhs_tau_c2_transformed_z1: 0.22
                  width_rhs_tau_c2_transformed_z2: 0.18
                  core_extra_passes: 1
                  max_steps_out: 70
                  max_shrink: 260
                  max_steps_out_sigma: 130
                  max_shrink_sigma: 360

stages:
  - id: S1_full_six_confirmation
    description: Full fixed 6-root confirmation of the best Phase 4 carry-forward candidate against the current anchor.
    profile_source: all_candidates
    selector:
      mode: all
    advance:
      type: rank_filter_top_n
      top_n: 1
      max_total_fail_n: 4
      max_sentinel_fail_n: 1
      max_runtime_inflation: 0.35
      min_fail_reduction: 0.20
      min_severe_improved_n: 1
