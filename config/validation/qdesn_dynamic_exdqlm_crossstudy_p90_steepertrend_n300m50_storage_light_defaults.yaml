  - runtime_sec_per_1k_train_eval
runtime:
  threads: 1
  campaign_workers: 16
  workers: 16
  root_scheduler: load_balanced
signoff:
  vb:
    tail_window: 5
    min_trace_length: 5
    elbo_rel_range_pass: 0.01
    elbo_rel_range_warn: 0.05
    core_rel_range_pass: 0.02
    core_rel_range_warn: 0.1
    rhs_rel_range_pass: 0.05
    rhs_rel_range_warn: 0.2
    require_converged_for_pass: yes
  mcmc:
    min_keep_pass: 300
    min_keep_warn: 180
    ess_pass: 30
    ess_warn: 10
    acf1_pass: 0.9
    acf1_warn: 0.98
    geweke_absz_pass: 2.0
    geweke_absz_warn: 3.0
    half_drift_pass: 0.25
    half_drift_warn: 0.5
reservoir_profiles:
  deep_d3_n400x3_skip100_w300_m60:
    D: 3
    'n':
    - 400
    - 400
    - 400
    n_tilde:
    - 400
    - 400
    m: 60
    alpha:
    - 0.3
    - 0.3
    - 0.3
    rho:
    - 0.95
    - 0.95
    - 0.95
    act_f:
    - tanh
    - tanh
    - tanh
    act_k:
    - identity
    - identity
    - identity
    pi_w:
    - 0.1
    - 0.1
    - 0.1
    pi_in:
    - 1.0
    - 1.0
    - 1.0
    washout: 300
    add_bias: yes
    seed: 123
external_data:
  holdout_n: 1
  y_column: 'y'
  q_true_column: q_true
  source_index_column: source_index
preproc:
  scale_y: yes
  scale_x: yes
lags:
  m_y: 12
  m_x: 0
pipeline:
  verbose: yes
  readout:
    include_input: yes
    reservoir_lags: 1
    input_position: after_reservoir
    input_mode: raw_y_lags
  decomposition:
    enabled: no
  sampling:
    nd_draws: 20000
    chunk: 160
  forecast:
    mode: origin
    train_last_window: 18
    fore_last_window: 18
  synthesis:
    isotonic: no
    rearrange: no
    grid_M: 151
    n_samp: 20000
    seed: 321
  diagnostics:
    calibration: no
    pit: no
    scores: yes
    lead_eval: no
    fan_charts: no
    plots: no
  cpp:
    use_postpred: no
    postpred_omp: no
    postpred_precompute: no
    postpred_threads: 1
  outputs:
    save: yes
    keep_draws: no
    keep_mcmc_vb_init: no
    retention_profile: analysis
    save_forecast_objects: no
    save_compact_fit_paths: yes
    save_metric_summaries: yes
    retain_full_rds_on_failure: no
    thesis_subset: no
  inference:
    likelihood_family: exal
    readout_scale: yes
    vb:
      max_iter: 300
      min_iter_elbo: 80
      n_samp_xi: 1000
      verbose: yes
      sigmagam:
        freeze_warmup_iters: 10
        force_after_warmup: yes
        postwarmup_damping: 0.5
        postwarmup_damping_iters: 3
        min_postwarmup_updates: 1
      diagnostics:
        rhs_trace: yes
        rhs_deep: no
      rhs:
        freeze_tau_iters: 50
        freeze_tau_warmup_iters: 50
        tau_local_tol: 0.0005
        min_tau_updates: 2
        force_tau_after_warmup: yes
      prior_overrides:
        ridge:
          max_iter: 300
          min_iter_elbo: 80
          n_samp_xi: 1000
        rhs_ns:
          max_iter: 300
          min_iter_elbo: 80
          n_samp_xi: 1000
          rhs:
            freeze_tau_iters: 50
            freeze_tau_warmup_iters: 50
            tau_local_tol: 0.0005
            min_tau_updates: 2
            force_tau_after_warmup: yes
      priors:
        gamma:
          mu0: 0
          s20: 10
        sigma:
          a: 1
          b: 1
        beta:
          ridge:
            tau2: 20
          rhs_ns:
            tau0: 0.01
            a_zeta: 2.0
            b_zeta: 1.0
            s2: 0.5
            shrink_intercept: no
            intercept_prec: 1.0e-10
            n_inner: 2
            var_floor: 1.0e-08
            init_log_tau: ~
            init_log_lambda: 0.0
            init_log_c2: 0.0
    mcmc:
      n_burn: 5000
      n_mcmc: 20000
      thin: 1
      verbose: yes
      progress_every: 500
      init_from_vb: yes
      vb_warm_start_control:
        method: ldvb
        max_iter: 300
        min_iter_elbo: 80
        n_samp_xi: 1000
        verbose: no
        sigmagam:
          freeze_warmup_iters: 10
          force_after_warmup: yes
          postwarmup_damping: 0.5
          postwarmup_damping_iters: 3
          min_postwarmup_updates: 1
        rhs_trace: yes
        rhs_deep: no
        rhs:
          freeze_tau_iters: 50
          freeze_tau_warmup_iters: 50
          tau_local_tol: 0.0005
          min_tau_updates: 2
          force_tau_after_warmup: yes
      store_latent_draws: no
      store_rhs_draws: no
      transforms:
        use_log_sigma: yes
        sigma_eta_bounds:
        - -20
        - 20
      rhs:
        freeze_tau_burnin_iters: 500
        freeze_tau_only_during_burn: yes
        width_adapt:
          enabled: no
          warmup_iters: 0
          only_during_burn: yes
          target_score_low: -0.75
          target_score_high: 0.75
          step_size: 0.015
          width_min: 0.02
          width_max: 1.8
      sigmagam:
        freeze_burnin_iters: 50
        freeze_only_during_burn: yes
        force_after_warmup: yes
        delay_adapt_until_after_warmup: yes
        delay_laplace_refresh_until_after_warmup: yes
      slice:
        core_update_mode: sigma_then_gamma
        width_gamma: 0.45
        width_sigma: 0.28
        width_rhs_lambda: 0.2
        width_rhs_tau: 0.12
        width_rhs_c2: 0.08
        width_rhs_tau_c2_block: 0.24
        rhs_global_block_update: transformed_tau_c2_block
        rhs_transformed_block_passes: 3
        core_extra_passes: 2
        max_steps_out: 90
        max_shrink: 320
        max_steps_out_sigma: 150
        max_shrink_sigma: 400
      prior_overrides:
        ridge:
          n_burn: 5000
          n_mcmc: 20000
          progress_every: 500
          slice:
            core_update_mode: sigma_then_gamma
            width_gamma: 0.45
            width_sigma: 0.25
            core_extra_passes: 2
            max_steps_out: 90
            max_shrink: 320
            max_steps_out_sigma: 150
            max_shrink_sigma: 400
        rhs_ns:
          n_burn: 5000
          n_mcmc: 20000
          progress_every: 500
          rhs:
            freeze_tau_burnin_iters: 500
            freeze_tau_only_during_burn: yes
            width_adapt:
              enabled: no
              warmup_iters: 0
              only_during_burn: yes
              target_score_low: -0.75
              target_score_high: 0.75
              step_size: 0.015
              width_min: 0.02
              width_max: 1.8
          slice:
            core_update_mode: sigma_then_gamma
            width_gamma: 0.42
            width_sigma: 0.3
            width_rhs_lambda: 0.18
            width_rhs_tau: 0.1
            width_rhs_c2: 0.07
            width_rhs_tau_c2_block: 0.22
            rhs_global_block_update: transformed_tau_c2_block
            rhs_transformed_block_passes: 3
            core_extra_passes: 2
            max_steps_out: 100
            max_shrink: 360
            max_steps_out_sigma: 160
            max_shrink_sigma: 420
      priors:
        gamma:
          mu0: 0
          s20: 10
        sigma:
          a: 1
          b: 1
        beta:
          ridge:
            tau2: 20
          rhs_ns:
            tau0: 0.01
            a_zeta: 2.0
            b_zeta: 1.0
            s2: 0.5
            shrink_intercept: no
            intercept_prec: 1.0e-10
            n_inner: 2
            var_floor: 1.0e-08

