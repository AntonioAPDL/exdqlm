campaign:
  name: qdesn_dynamic_exdqlm_crossstudy_p90_steepertrend_n300m50_validation
  results_root: results/qdesn_mcmc_validation/dynamic_exdqlm_crossstudy_p90_steepertrend_n300m50_validation
  reports_root: reports/qdesn_mcmc_validation/dynamic_exdqlm_crossstudy_p90_steepertrend_n300m50_validation
grid:
  source_mode: materialized_source_inputs
execution:
  methods:
  - vb
  - mcmc
  likelihood_families:
  - exal
  - al
  seed_policy:
    mode: deterministic_per_root
    base_seed: 41000
study_contract:
  core_lane: yes
  id: p90_steepertrend_n300m50_main
  description: >-
    Canonical QDESN dynamic relaunch on the promoted period-90 steeper-trend
    dataset surface using the active n400/m60 deep reservoir profile. The main lane
    keeps LDVB everywhere for VB, slice everywhere for MCMC, explicit LDVB warm starts
    for every MCMC fit, normalized warmup defaults, and does not persist MCMC VB-init
    fit artifacts in saved forecast objects. Future launches use analysis retention:
    scalar metrics and compact quantile-path bands are kept, while full successful
    forecast object payloads are pruned after summaries are written.
  budget:
    posterior_metric_draws: 20000
    vb_sampling_nd_draws: 20000
    vb_synthesis_n_samp: 20000
    mcmc_n_burn: 5000
    mcmc_n_mcmc: 20000
    mcmc_thin: 1
  vb:
    method: LDVB
    profile_id: qdesn_ldvb_canonical_v1
    sigmagam:
      freeze_warmup_iters: 10
      force_after_warmup: yes
      postwarmup_damping: 0.5
      postwarmup_damping_iters: 3
      min_postwarmup_updates: 1
  mcmc:
    kernel: slice
    require_slice: yes
    require_init_from_vb: yes
    banned_proposals:
    - rw
    - laplace_rw
    sigmagam:
      freeze_burnin_iters: 50
      freeze_only_during_burn: yes
      force_after_warmup: yes
      delay_adapt_until_after_warmup: yes
      delay_laplace_refresh_until_after_warmup: yes
    vb_warm_start:
      method: LDVB
      max_iter: 300
      min_iter_elbo: 80
      n_samp_xi: 1000
      sigmagam:
        freeze_warmup_iters: 10
        force_after_warmup: yes
        postwarmup_damping: 0.5
        postwarmup_damping_iters: 3
        min_postwarmup_updates: 1
rescue_overlays:
  enabled: no
  mode: explicit_optional
  inventory_csv: config/validation/qdesn_dynamic_exdqlm_crossstudy_effective_w300_postdraw_deepdesn_rowfaithful_multiseed_inventory.csv
  row_overrides_source_defaults: config/validation/qdesn_dynamic_exdqlm_crossstudy_effective_w300_postdraw_deepdesn_rowfaithful_multiseed_defaults.yaml
source_materialization:
  dynamic_root: results/qdesn_mcmc_validation/dynamic_exdqlm_crossstudy_candidate_sources
  staged_root: results/qdesn_mcmc_validation/dynamic_exdqlm_crossstudy_p90_steepertrend_main_sources
  enforce_effective_train_size: yes
  scenarios: dlm_constV_p90_m0amp_highnoise_steepertrend_v1
  families:
  - gausmix
  - laplace
  - normal
  taus:
  - 0.05
  - 0.25
  - 0.5
  windows:
  - effective_fit_size: 500
    source_total_size: 813
    source_dir_name: fit_input_effTT500_totalTT813
    label: effTT500_totalTT813
  - effective_fit_size: 5000
    source_total_size: 5313
    source_dir_name: fit_input_effTT5000_totalTT5313
    label: effTT5000_totalTT5313
pilot:
  source_root_kind: dynamic
  source_scenario: dlm_constV_p90_m0amp_highnoise_steepertrend_v1
  source_family: normal
  tau: 0.25
  fit_size: 5000
  effective_fit_size: 5000
  source_total_size: 5313
  source_window_label: effTT5000_totalTT5313
  beta_prior_type: ridge
  seed: 123
  reservoir_profile: deep_d3_n400x3_skip100_w300_m60
  enabled: yes
  source_reference_priors: default
  source_current_rhsns_member: no
  source_legacy_rhs_member: no
reference:
  dynamic_root: results/qdesn_mcmc_validation/dynamic_exdqlm_crossstudy_candidate_sources
reference_contract:
  root_kind: dynamic
  scenarios: dlm_constV_p90_m0amp_highnoise_steepertrend_v1
  families:
  - gausmix
  - laplace
  - normal
  taus:
  - 0.05
  - 0.25
  - 0.5
  fit_sizes:
  - 500
  - 5000
  expected_unique_dataset_cells: 18
  expected_qdesn_roots: 36
  expected_priors:
  - ridge
  - rhs_ns
smoke:
