  family: normal
  tau: 0.25
  fit_sizes:
  - 500
  - 5000
  priors: ridge
metrics:
  primary_window: train
  holdout_role: secondary_single_point
  posterior_metric_draws: 20000
  qtrue_metrics:
  - mae
  - rmse
  - bias
  - corr
  - median_ae
  - p90_ae
