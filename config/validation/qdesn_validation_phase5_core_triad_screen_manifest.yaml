stages:
  - id: S1_core_triad_broad
    description: Broad screen on the exact 3-root unresolved core triad using R18 as the local baseline.
    profile_source: all_candidates
    selector:
      mode: explicit_roots
      roots:
        - scenario: dlm_constV_bigW
          tau: 0.05
          likelihood_family: exal
          beta_prior_type: ridge
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: ridge
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
    advance:
      type: rank_filter_top_n
      top_n: 2
      max_severe_fail_n: 2
      max_total_fail_n: 2
      max_runtime_inflation: 0.60
      min_fail_reduction: 0.34
      min_severe_improved_n: 1

  - id: S2_full_six_confirmation
    description: Full fixed 6-root confirmation for the top core-triad survivors.
    profile_source: selected_from_previous
    selector:
      mode: all
    advance:
      type: rank_filter_top_n
      top_n: 1
      max_total_fail_n: 4
      max_sentinel_fail_n: 1
      max_runtime_inflation: 0.50
      min_fail_reduction: 0.20
      min_severe_improved_n: 1
