experiment:
  id: E08
  description: narrow RHS widths with larger stepping budget to prevent truncation

patch:
  pipeline:
    inference:
      mcmc:
        prior_overrides:
          rhs:
            slice:
              width_rhs_lambda: 0.14
              width_rhs_tau: 0.10
              width_rhs_c2: 0.12
              width_rhs_tau_c2_block: 0.45
              max_steps_out: 120
              max_shrink: 600

