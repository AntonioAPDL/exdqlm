stages:
  - id: S1_ridge_resolution_screen
    description: Broad ridge-led screen on the remaining ridge problem plus the key rhs guard rails.
    profile_source: all_candidates
    selector:
      mode: explicit_roots
      roots:
        - scenario: dlm_ar1V
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_bigW
          tau: 0.05
          likelihood_family: exal
          beta_prior_type: ridge
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.50
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: rhs_ns
          seed: 123
          reservoir_profile: tiny_d1_n8
        - scenario: dlm_constV_smallW
          tau: 0.95
          likelihood_family: exal
          beta_prior_type: ridge
          seed: 123
          reservoir_profile: tiny_d1_n8
    advance:
      type: rank_filter_top_n
      top_n: 6
      max_total_fail_n: 3
      max_sentinel_fail_n: 0
      max_runtime_inflation: 1.25
      min_fail_reduction: 0.40
      min_severe_improved_n: 1

  - id: S2_full_six_confirmation
    description: Full fixed 6-root confirmation for the strongest ridge-led survivors.
    profile_source: selected_from_previous
    selector:
      mode: all
    advance:
      type: rank_filter_top_n
      top_n: 3
      max_total_fail_n: 3
      max_sentinel_fail_n: 0
      max_runtime_inflation: 1.20
      min_fail_reduction: 0.50
      min_severe_improved_n: 1

  - id: S3_stability_confirmation
    description: Exact rerun of the full-6 survivors for stability before promotion.
    profile_source: selected_from_previous
    selector:
      mode: all
    advance:
      type: report_only
