# Global, conservative defaults for Q-DESN + exAL VB pipelines.
# Lowest precedence: any spec YAML can override these.

suite_name: sim_suite_dlm
results_root: results

# --------------------------------------------------------------------
# Orchestration (tmux batch runner defaults)
# -------------- ------------------------------------------------------
orchestrate:
  concurrency: 3       # max concurrent tmux sessions
  threads_per_proc: 4  # used by batch runners for OMP caps
  skip_if_success: true
  resume_failed: false

tmux:
  session_prefix: esn-

# --------------------------------------------------------------------
# Data split: how much of the series to use and how to split train/forecast
# (Mode-specific defaults live under mode_overrides below.)
# --------------------------------------------------------------------
split:
  use_prop: null     # optional fraction of T_full to use instead of T_use
  use_last: true     # if true, take last T_use points; else first T_use
  train_n: null      # fixed training length (overrides train_prop if non-null)
  # T_use and train_prop are set per mode in mode_overrides.

# --------------------------------------------------------------------
# Quantile levels fitted independently by VB
# --------------------------------------------------------------------
p_vec: [0.05, 0.50, 0.95]

# --------------------------------------------------------------------
# Pipeline-level defaults
# --------------------------------------------------------------------
pipeline:
  mode: sim          # "sim" or "real"
  profile: full      # "full" or "ms" (model_selection)
  verbose: true      # global verbosity flag

# --------------------------------------------------------------------
# Mode-specific defaults (merged on top of the base config by pipeline_run.R)
# These are the only parameters duplicated across modes:
# split.T_use, split.train_prop, columns, preproc, lags.
# --------------------------------------------------------------------
mode_overrides:
  sim:
    split:
      T_use: 5000
      train_prop: 0.94
  real:
    split:
      T_use: 10000
      train_prop: 0.98
    columns:
      y: USGS
      x: [ppt, soil]
    preproc:
      scale_y: true
      scale_x: true
    lags:
      m_y: 30
      m_x: 30

# --------------------------------------------------------------------
# DESN (reservoir) defaults
# --------------------------------------------------------------------
desn:
  # Deep Echo State Network (reservoir) defaults.
  D: 3                       # number of reservoir layers
  n: [100, 100, 100]         # units per layer (length D)
  n_tilde: [100, 100]        # skip/reducer sizes (length D-1 when D>1)
  m: 30                    # number of lags in u_t
  alpha: [0.2, 0.2, 0.2]  # leak per layer (length D)
  rho:   [0.95, 0.95, 0.95]  # spectral scales per layer (length D)
  act_f: ["tanh", "tanh", "tanh"]                 # state nonlinearity per layer
  act_k: ["identity", "identity", "identity"]     # output activation per layer
  pi_w:  [0.1, 0.1, 0.1]  # sparsity of recurrent weights per layer
  pi_in: [1.0, 1.0, 1.0]  # sparsity of input weights per layer
  washout: 500               # initial time steps discardedmode_overrides
  add_bias: true             # include bias column in readout
  seed: [12345, 12344, 12343]  # per-layer seeds (or use a scalar if your code expands it)

# --------------------------------------------------------------------
# Variational Bayes (exAL LDVB) defaults
# These match what pipeline_sim_main.R expects in cfg$vb
# --------------------------------------------------------------------
vb:
  max_iter: 500
  min_iter_elbo: 50        # mssinimum VB iterations before ELBO/tol stopping
  readout_scale: true       # z-score readout design matrix (excluding intercept)
  diagnostics:
    rhs_trace: true
    rhs_deep: false
    rhs_trace_thresholds: [1.0e3, 1.0e6, 1.0e9]
    rhs_trace_top_k: 20
    rhs_trace_eps: [1.0e-6, 1.0e-4, 1.0e-2]
  rhs:
    freeze_tau_iters: 20
    freeze_tau_warmup_iters: 20
    update_every: 1
    update_every_warmup: 1
    update_every_warmup_iters: 0
    beta_presteps: 1
    beta_presteps_iters: 0
    gradcheck: false
    gradcheck_iters: [1, 5]
    gradcheck_h: 1.0e-5
    tau_local_tol: 1.0e-3          # local ELBO tol for tau updates; null disables gating
    min_tau_updates: 1
    max_tau_updates: null
    force_tau_after_warmup: true
    recompute_elbo_after_tau_update: true
  priors:
    beta:
      type: rhs
      ridge:
        tau2: 10000
      rhs:
        tau0: 1
        nu: 4.0
        s2: 1
        shrink_intercept: false
        intercept_prec: 1.0e-16
        n_inner: 1
        eta_bounds:
          lambda: [-20, 20]
          tau:    [-20, 20]
          c2:     [-20, 20]
        h_curv: 1.0e-8
        var_floor: 1.0e-8
        verbose: false
        init_log_lambda: 0.0
        init_log_tau: null
        init_log_c2: 0.0

# --------------------------------------------------------------------
# Readout feature composition
# --------------------------------------------------------------------
readout:
  include_input: true       # append raw input-lag block to readout
  reservoir_lags: 1         # number of reservoir-feature lags to append
  input_position: after_reservoir  # ordering for input block (reserved)

# --------------------------------------------------------------------
# Sampling defaults (posterior / predictive)
# --------------------------------------------------------------------
sampling:
  nd_draws: 3000             # parameter + predictive draws (also mixture draws)
  chunk: 250                 # chunk size for memory-friendly sampling

# --------------------------------------------------------------------
# IJ correction defaults
# --------------------------------------------------------------------
ij:
  use_ij_correction: false    # TRUE = IJ-corrected μ bands; FALSE = posterior-only bands
  nd_draws: 3000             # draws used in IJ computation
  beta_mode: replace        # additive | replace (how IJ inflates beta draws)

# --------------------------------------------------------------------
# Forecasting defaults
# --------------------------------------------------------------------
forecast:
  last_window: 250           # legacy base window
  horizon: 30                 # multi-step horizon for lattice forecasts
  mode: origin               # origin (lead-1) | mixture | lattice
  lead_weight_power: 10      # base weights w_r ∝ 1 / r^power (mixture only; power=0 => uniform)
  # mixture draws per target time = sampling.nd_draws
  eval_leads: all           # null | "all" | list of leads to evaluate

  # Optional separate windows (if null, fallback to last_window)
  train_last_window: null
  fore_last_window: 300

  # How to report coverage in plot subtitles:
  # "global" = coverage over full span
  # "window" = coverage on last N window points
  # "both" = both metrics
  coverage_report: global

# --------------------------------------------------------------------
# C++ backend toggles (optional)
# --------------------------------------------------------------------
cpp:
  use_postpred: true        # C++ posterior predictive sampler (FALSE = R path)
  postpred_omp: true        # optional OpenMP in post-pred
  postpred_precompute: true # precompute noise draws (for A/B)
  postpred_threads: 4       # cap OpenMP threads to avoid oversubscription

# --------------------------------------------------------------------
# Quantile synthesis defaults (across p_vec)
# --------------------------------------------------------------------
synthesis:
  isotonic: true             # isotonic regression for monotonicity
  rearrange: true            # rearrangement for monotone quantile curves
  grid_M: 1001               # grid size for synthesis
  n_samp: 1000               # draws for synthesized predictive bands
  seed: 123                  # seed for synthesis

# --------------------------------------------------------------------
# Diagnostics and plotting defaults
# --------------------------------------------------------------------
diagnostics:
  calibration: true          # probability integral transform / calibration
  pit: true                  # PIT diagnostics
  pit_scope: all+synth       # median | all | synth | all+synth
  scores: true               # CRPS / interval scores, etc.
  lead_eval: true            # synthesized lead-specific CRPS diagnostics
  fan_charts: true           # overlapping forecast fan charts
  fan_stride: 30             # plot every k-th origin (1 = all)
  cov_window: 365            # rolling-coverage window length
  cov_show_last: 300         # rolling-coverage plot tail length
  plots: true                # master gate for ggplot-based outputs

# --------------------------------------------------------------------
# Naming overrides (optional)
# --------------------------------------------------------------------
naming: {}

# --------------------------------------------------------------------
# Outputs (saving heavy artifacts)
# --------------------------------------------------------------------
outputs:
  save: true                 # save outputs to disk
  keep_draws: false          # whether to save posterior draws
  thesis_subset: false       # subset of plots/tables for thesis use
