# Stable, conservative defaults applied to all runs (lowest precedence)
suite_name: sim_suite_dlm
results_root: results

split:
  T_use: 3300
  use_prop: null
  use_last: true
  train_n: null
  train_prop: 0.90909

p_vec: [0.05, 0.50, 0.95]

desn:                     # <-- add this header (it was commented out)
  D: 3
  "n": [15,10,5]       # keep "n" quoted
  n_tilde: [10,5]       # length D-1
  m: 60
  alpha:   [0.25, 0.25, 0.25]
  rho:     [0.95, 0.95, 0.95]
  act_f:   [tanh, tanh, tanh]
  act_k:   [identity, identity, identity]
  pi_w:    [0.05, 0.05, 0.05]
  pi_in:   [1.0, 1.0, 1.0]
  washout: 300
  add_bias: true
  seed:    [42, 41, 40]

vb:
  max_iter: 1000
  tol_50:        1.0e-3
  tol_extreme:   1.0e-3
  tol_par_50:    1.0e-3    
  tol_par_extreme: 1.0e-3
  n_samp_xi: 5000
  verbose: true

sampling:
  nd_draws: 2000
  chunk: 250

forecast:
  rolling_origin: true
  H_step: 1
  last_window: 200           # base/default
  train_last_window: 500
  fore_last_window: 500

synthesis:
  isotonic: true
  rearrange: true
  grid_M: 2001
  n_samp: 2000
  seed: 123

outputs:
  save: true
  keep_draws: false
  thesis_subset: true

orchestrate:
  concurrency: 10
  threads_per_proc: 10
  skip_if_success: true
  resume_failed: false

naming:
  bands_prefix: forecast_mu_band_p=
  empq_prefix: forecast_emp_q_vs_true_p=
  synth_prefix: forecast_synth_vs_true_p=
  pit_train: pit_train.png
  pit_forecast: pit_forecast.png
  elbo_prefix: elbo_traces_skip_k=
  cov_mu_train_prefix: rolling_cov_mu_train_W=
  cov_mu_fore_prefix: rolling_cov_mu_forecast_W=
  cov_qhat_train_prefix: rolling_cov_qhat_train_W=
  cov_qhat_fore_prefix: rolling_cov_qhat_forecast_W=
  cov_qsynth_train_prefix: rolling_cov_qsynth_train_W=
  cov_qsynth_fore_prefix: rolling_cov_qsynth_forecast_W=
  calib_mu: calibration_mu_table.csv
  calib_qhat: calibration_qhat_table.csv
  calib_qsynth: calibration_qsynth_table.csv
  metrics_summary: metrics_summary.csv
  objects_rds: forecast_objects.rds

pipeline:
  mode: sim
