# Stable, conservative defaults applied to all runs (lowest precedence)
suite_name: sim_suite_dlm
results_root: results

p_vec: [0.05, 0.50, 0.95]

# ESN / DESN spec (shared across quantiles unless overridden)
desn:
  D: 1
  "n": [300]
  n_tilde: []
  m: 20
  alpha: 0.4            # leak
  rho: [0.98]           # spectral scaling per layer
  act_f: tanh
  act_k: identity
  pi_w: 0.05
  pi_in: 1.00
  washout: 500
  add_bias: true
  seed: 42

# Variational Bayes options (base)
vb:
  max_iter: 130
  tol_50: 1.0e-4        # p=0.50
  tol_extreme: 1.0e-5   # p!=0.50
  n_samp_xi: 500
  verbose: true

# Posterior predictive sampling
sampling:
  nd_draws: 2000
  chunk: 250

# Rolling-origin / forecasting
forecast:
  rolling_origin: true
  H_step: 1
  last_window: 200

# Synthesis
synthesis:
  isotonic: true
  rearrange: true
  grid_M: 1001
  n_samp: 2000
  seed: 123

# Outputs
outputs:
  save: true
  keep_draws: false      # heavy; enable per-dataset or spec
  thesis_subset: true

# Orchestration
orchestrate:
  concurrency: 2         # upper bound of simultaneous tmux sessions
  threads_per_proc: 10    # set BLAS/OMP per R process
  skip_if_success: true  # idempotency
  resume_failed: false

# File/dir names (contract)
naming:
  bands_prefix: forecast_mu_band_p=
  empq_prefix: forecast_emp_q_vs_true_p=
  synth_prefix: forecast_synth_vs_true_p=
  pit_train: pit_train.png
  pit_forecast: pit_forecast.png
  elbo_prefix: elbo_traces_skip_k=
  cov_mu_train_prefix: rolling_cov_mu_train_W=
  cov_mu_fore_prefix: rolling_cov_mu_forecast_W=
  cov_qhat_train_prefix: rolling_cov_qhat_train_W=
  cov_qhat_fore_prefix: rolling_cov_qhat_forecast_W=
  cov_qsynth_train_prefix: rolling_cov_qsynth_train_W=
  cov_qsynth_fore_prefix: rolling_cov_qsynth_forecast_W=
  calib_mu: calibration_mu_table.csv
  calib_qhat: calibration_qhat_table.csv
  calib_qsynth: calibration_qsynth_table.csv
  metrics_summary: metrics_summary.csv
  objects_rds: forecast_objects.rds
