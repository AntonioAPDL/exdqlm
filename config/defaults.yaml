# Global, conservative defaults for Q-DESN + exAL VB pipelines.
# These have lowest precedence and can be overridden by any spec YAML.

suite_name: sim_suite_dlm
results_root: results

split:
  # How much of the full series to use and how to split train / forecast.
  T_use: 3300          # number of time points used (from end if use_last = true)
  use_prop: null       # optional fraction of T_full to use instead of T_use
  use_last: true       # if true, take last T_use points; else first T_use
  train_n: null        # fixed training length (overrides train_prop if non-null)
  train_prop: 0.90909  # fallback train fraction if train_n is null

# Quantile levels fitted independently by VB.
p_vec: [0.05, 0.50, 0.95]

desn:
  # Deep Echo State Network (reservoir) defaults.
  D: 3                        # number of reservoir layers
  "n": [20, 20, 20]           # units per layer (length D)
  n_tilde: [20, 20]           # skip connections; length D-1 or D
  m: 45                       # readout dimension
  alpha: [0.3, 0.3, 0.3]      # leaking rate per layer
  rho: [0.95, 0.95, 0.95]     # target spectral radius per layer
  act_f: [tanh, tanh, tanh]   # state non-linearity
  act_k: [identity, identity, identity]  # output activation
  pi_w: [0.05, 0.05, 0.05]    # sparsity of recurrent weights
  pi_in: [1.0, 1.0, 1.0]      # sparsity of input weights
  washout: 300                # initial time steps discarded from reservoir
  add_bias: true              # include bias terms in readout
  seed: [42, 41, 40]          # per-layer RNG seeds (or scalar)

vb:
  # Variational Bayes controls shared across quantiles.
  max_iter: 1000
  tol_50: 1.0e-3              # ELBO tol at the median quantile
  tol_extreme: 1.0e-3         # ELBO tol at tail quantiles
  tol_par_50: 1.0e-3          # safeguard on E[gamma], E[sigma] at p = 0.5
  tol_par_extreme: 1.0e-3     # safeguard at tail quantiles
  n_samp_xi: 5000             # kept for backward compatibility (unused in LD)
  verbose: true

  init:
    # Initial means for LD parameters (natural scale), one per p in p_vec.
    gamma: [0.0, 0.0, 0.0]    # start γ near 0
    sigma: [1.0, 1.0, 1.0]    # start σ near 1 (positive scale)

  priors:
    gamma:
      # Normal prior for γ | p ~ N(mu0_p, s20_p).
      mu0: [0.0, 0.0, 0.0]
      s20: [10.0, 10.0, 10.0]   # fairly vague

    sigma:
      # Inverse-Gamma prior σ | p ~ IG(a_p, b_p).
      # Scalars are recycled across p_vec; vectors must match length(p_vec).
      a: [1.0, 1.0, 1.0]
      b: [1.0, 1.0, 1.0]

    beta:
      # Ridge prior variance for readout β: V0 = tau2 * I.
      tau2: 10.0

sampling:
  # Posterior predictive draws used for diagnostics / synthesis.
  nd_draws: 2000
  chunk: 250

forecast:
  # Rolling-origin forecast configuration.
  rolling_origin: true
  H_step: 1
  last_window: 200            # base window for plots
  train_last_window: 500      # window for train plots
  fore_last_window: 500       # window for forecast plots

ij:
  # Inference-jackknife (IJ) correction for μ-bands.
  use_ij_correction: true
  nd_draws: 2000              # parameter draws used in IJ variance

synthesis:
  # Quantile synthesis (isotonic regression + rearrangement).
  isotonic: true
  rearrange: true
  grid_M: 2001                # grid size for synthesis
  n_samp: 2000                # synthesized predictive draws
  seed: 123

outputs:
  # What to persist to disk.
  save: true
  keep_draws: false           # keep full draws objects (large)
  thesis_subset: false        # additional reduced exports for thesis

orchestrate:
  # High-level orchestration defaults (used by runners).
  concurrency: 10
  threads_per_proc: 10
  skip_if_success: true
  resume_failed: false

naming:
  # File-name prefixes / conventions for figures and tables.
  bands_prefix: forecast_mu_band_p=
  empq_prefix: forecast_emp_q_vs_true_p=
  synth_prefix: forecast_synth_vs_true_p=
  pit_train: pit_train.png
  pit_forecast: pit_forecast.png
  elbo_prefix: elbo_traces_skip_k=
  cov_mu_train_prefix: rolling_cov_mu_train_W=
  cov_mu_fore_prefix: rolling_cov_mu_forecast_W=
  cov_qhat_train_prefix: rolling_cov_qhat_train_W=
  cov_qhat_fore_prefix: rolling_cov_qhat_forecast_W=
  cov_qsynth_train_prefix: rolling_cov_qsynth_train_W=
  cov_qsynth_fore_prefix: rolling_cov_qsynth_forecast_W=
  calib_mu: calibration_mu_table.csv
  calib_qhat: calibration_qhat_table.csv
  calib_qsynth: calibration_qsynth_table.csv
  metrics_summary: metrics_summary.csv
  objects_rds: forecast_objects.rds

pipeline:
  mode: sim                  # "sim" or "real" (overridden by specs / env)
