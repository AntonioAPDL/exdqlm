# Real-data profile for San Lorenzo:
# DLM-informed QDESN inputs (CPP decomposition), transfer block enabled,
# RHS prior for VB readout, and full plotting diagnostics.

suite_name: real_suite_dlm_transfer_soil_ppt

pipeline:
  mode: real
  verbose: true

cpp:
  use_postpred: true
  postpred_omp: true
  postpred_precompute: true
  postpred_threads: 4

columns:
  y: USGS
  x: [ppt, soil]

readout:
  input_mode: dlm_decomp_lags

decomposition:
  enabled: true
  backend: cpp
  state_estimate: smoothed
  components: [trend, seasonal, transfer, residual]

  trend:
    degree: 0

  seasonal:
    period: 363.5854
    harmonics: [1, 2, 0.1469108476]
    auto:
      enabled: false

  transfer:
    enabled: true
    x_cols: [soil, ppt]
    lambda: 0.97
    features:
      include_raw: true
      lags: [0, 1, 2, 3]
      include_squares: true
      include_interactions: true
      interaction_pairs: [[soil, ppt]]
      same_lag_only: true

  input_lags_mode: component
  input_lags:
    trend: 360
    seasonal: 360
    transfer: 360
    residual: 360
    regression: 360

  discount:
    trend: 0.999999
    seasonal: 0.999999
    transfer_zeta: 0.999999
    transfer_psi: 0.999999

  variance:
    mode: unknown_constant
    l0: 1
    S0: 1

  forecast:
    residual_recursion: sampled_path

desn:
  D: 3
  n: [500, 500, 500]
  n_tilde: [500, 500]
  m: 30
  alpha: [0.4, 0.4, 0.4]
  rho: [0.95, 0.95, 0.95]
  act_f: ["tanh", "tanh", "tanh"]
  act_k: ["identity", "identity", "identity"]
  pi_w: [0.1, 0.1, 0.1]
  pi_in: [1.0, 1.0, 1.0]
  washout: 500
  add_bias: true
  seed: [12345, 12344, 12343]

vb:
  max_iter: 300
  min_iter_elbo: 50
  readout_scale: true
  diagnostics:
    rhs_trace: true
    rhs_deep: false
    rhs_trace_thresholds: [1.0e3, 1.0e6, 1.0e9]
    rhs_trace_top_k: 20
    rhs_trace_eps: [1.0e-6, 1.0e-4, 1.0e-2]
  rhs:
    freeze_tau_iters: 50
    freeze_tau_warmup_iters: 50
    update_every: 1
    update_every_warmup: 1
    update_every_warmup_iters: 0
    beta_presteps: 1
    beta_presteps_iters: 0
    gradcheck: false
    gradcheck_iters: [1, 5]
    gradcheck_h: 1.0e-5
    tau_local_tol: 1.0e-3
    min_tau_updates: 1
    max_tau_updates: null
    force_tau_after_warmup: true
    recompute_elbo_after_tau_update: true
  priors:
    beta:
      type: rhs
      ridge:
        tau2: 10000
      rhs:
        tau0: 0.001
        nu: 4.0
        s2: 0.1
        shrink_intercept: false
        intercept_prec: 1.0e-16
        n_inner: 1
        eta_bounds:
          lambda: [-20, 20]
          tau: [-20, 20]
          c2: [-20, 20]
        h_curv: 1.0e-8
        var_floor: 1.0e-8
        verbose: false
        init_log_lambda: 0.0
        init_log_tau: null
        init_log_c2: 0.0
  online:
    enabled: false
    strict: false
    M: 10
    K: 40
    W: 100
    L_loc: 2
    window_passes: 1
    jitter: 1.0e-10
    baseline:
      out_dir: results/online_vbld/stage0_baseline
      seed: 20260223
      'n': 72
      k: 5
      t0: 48
      p0: 0.5
      ridge_tau2: 5
      max_iter: 35
      tol: 1.0e-4
      tol_par: 1.0e-4
      check_repro: true
      write_trace: true

forecast:
  mode: mixture
  horizon: 20
  train_last_window: 300
  fore_last_window: 300

diagnostics:
  calibration: true
  pit: true
  pit_scope: all+synth
  scores: true
  lead_eval: true
  fan_charts: true
  fan_stride: 20
  cov_window: 365
  cov_show_last: 300
  plots: true

outputs:
  save: true
  keep_draws: false
