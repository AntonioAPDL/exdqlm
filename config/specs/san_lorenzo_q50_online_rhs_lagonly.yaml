# San Lorenzo real-data run: median-only Q-DESN with online VB-LD updates.
# This spec is intentionally lag-only (no external covariates).

pipeline:
  mode: real

split:
  use_last: true
  train_prop: 0.98

p_vec: [0.50]

columns:
  y: USGS
  x: []

lags:
  m_y: 365
  m_x: 0

readout:
  include_input: false
  reservoir_lags: 1
  input_position: after_reservoir

vb:
  max_iter: 100
  min_iter_elbo: 20
  tol: 1.0e-4
  tol_par: 1.0e-4
  # Kept for API compatibility; xi moments are computed via deterministic Delta.
  n_samp_xi: 100
  readout_scale: true
  rhs:
    freeze_tau_iters: 20
    freeze_tau_warmup_iters: 20
    update_every: 1
    update_every_warmup: 1
    update_every_warmup_iters: 0
    beta_presteps: 1
    beta_presteps_iters: 0
    gradcheck: false
    gradcheck_iters: [1, 5]
    gradcheck_h: 1.0e-5
    tau_local_tol: 1.0e-3
    min_tau_updates: 1
    max_tau_updates: null
    force_tau_after_warmup: true
    recompute_elbo_after_tau_update: true
  priors:
    beta:
      type: rhs
      ridge:
        tau2: 10000
      rhs:
        tau0: 0.001
        nu: 4.0
        s2: 0.1
        shrink_intercept: false
        intercept_prec: 1.0e-16
        n_inner: 1
        eta_bounds:
          lambda: [-20, 20]
          tau: [-20, 20]
          c2: [-20, 20]
        h_curv: 1.0e-8
        var_floor: 1.0e-8
        verbose: false
        init_log_lambda: 0.0
        init_log_tau: null
        init_log_c2: 0.0
  online:
    enabled: true
    strict: false
    M: 10
    K: 40
    W: 100
    L_loc: 2
    window_passes: 1
    maxit_sigmagam: 500
    jitter: 1.0e-10
    warm_start_frac: 0.7
    keep_trace: false
    update_rhs: true
    update_sigmagam: true

sampling:
  nd_draws: 3000
  chunk: 250

forecast:
  mode: origin
  horizon: 1
  train_last_window: 20
  fore_last_window: 20

diagnostics:
  cov_window: 365
  cov_show_last: 200

outputs:
  save: true
  keep_draws: false
