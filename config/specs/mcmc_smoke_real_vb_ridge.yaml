# Local smoke profile for inference validation through the observed-data pipeline.
# This is intentionally small and reproducible; it is not a benchmark profile.

suite_name: mcmc_inference_smoke

pipeline:
  mode: real
  verbose: false

split:
  use_last: true
  T_use: 120
  train_prop: 0.85

p_vec: [0.25, 0.50, 0.75]

columns:
  'y': "y"
  x: []

lags:
  m_y: 12
  m_x: 0

desn:
  D: 1
  'n': [16]
  n_tilde: []
  m: 6
  alpha: [0.2]
  rho: [0.9]
  act_f: tanh
  act_k: identity
  pi_w: [0.15]
  pi_in: [1.0]
  washout: 6
  add_bias: true
  seed: 202

readout:
  include_input: false
  reservoir_lags: 1
  input_position: after_reservoir

inference:
  method: vb
  readout_scale: true
  vb:
    max_iter: 25
    min_iter_elbo: 6
    n_samp_xi: 60
    verbose: false
    diagnostics:
      rhs_trace: false
      rhs_deep: false
    rhs:
      freeze_tau_iters: 5
      freeze_tau_warmup_iters: 5
    priors:
      beta:
        type: ridge
        ridge:
          tau2: 25

sampling:
  nd_draws: 48
  chunk: 24

forecast:
  mode: origin
  horizon: 4
  train_last_window: 20
  fore_last_window: 20

synthesis:
  isotonic: true
  rearrange: true
  grid_M: 301
  n_samp: 48
  seed: 123

diagnostics:
  calibration: false
  pit: false
  scores: true
  lead_eval: false
  fan_charts: false
  plots: false

cpp:
  use_postpred: false
  postpred_omp: false
  postpred_precompute: false
  postpred_threads: 1

outputs:
  save: true
  keep_draws: false
  thesis_subset: false
