# config/specs/sim_dlm_esn_tuning.yaml
# Lightweight ESN + exAL config for model selection on sim DLM data.

suite_name: sim_suite_dlm
spec_name: sim_dlm_esn_tuning
dataset_id: dlm_ar1V   # or dlm_constV_bigW / dlm_constV_smallW, etc.

pipeline:
  mode: sim
  profile: model_selection   # <<< this triggers the light behaviour in pipeline_sim_main.R

split:
  # Reuses your defaults, but explicit here is fine.
  T_use: 3300
  use_prop: null
  use_last: true
  train_n: null
  train_prop: 0.90

# ESN reservoir config: matches your in-script defaults
desn:
  D: 1
  n: [800]
  n_tilde: []         # no intermediate layers
  m: 50
  alpha: [0.2]
  rho: [0.95]
  act_f: ["tanh"]
  act_k: ["identity"]
  pi_w: [0.05]
  pi_in: [1.0]
  washout: 500
  add_bias: true
  seed: [42]

vb:
  max_iter: 120
  n_samp_xi: 250
  tol_50: 1.0e-4
  tol_extreme: 1.0e-5
  tol_par_50: 1.0e-4
  tol_par_extreme: 1.0e-5

sampling:
  nd_draws: 2000
  chunk: 250

forecast:
  last_window: 200
  rolling_origin: true
  H_step: 1
  train_last_window: 200
  fore_last_window: 200
  coverage_report: "global"

# Turn off all heavy diagnostics/plots for tuning
diagnostics:
  calibration: false
  pit: false
  scores: true      # keep CRPS + S
  plots: false      # new flag used by pipeline_sim_main.R

outputs:
  save: false       # don't write figs/tables/models to disk during selection
  keep_draws: false
  thesis_subset: false

ij:
  use_ij_correction: false   # no IJ during model selection; faster
  nd_draws: 1000
